<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malom Online - MVP Wireframe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for the Malom board geometry that are hard to do purely with utility classes */
        .malom-board {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
        }
        
        /* Concentric Squares */
        .square {
            position: absolute;
            border: 4px solid #cbd5e1; /* Slate-300 */
            border-radius: 8px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .sq-outer { width: 90%; height: 90%; border-color: #64748b; } /* Slate-600 */
        .sq-middle { width: 60%; height: 60%; border-color: #94a3b8; } /* Slate-400 */
        .sq-inner { width: 30%; height: 30%; border-color: #cbd5e1; } /* Slate-300 */

        /* Connecting Lines */
        .connector {
            position: absolute;
            background-color: #64748b;
        }
        
        .conn-top { width: 4px; height: 20%; top: 5%; left: 50%; transform: translateX(-50%); }
        .conn-bottom { width: 4px; height: 20%; bottom: 5%; left: 50%; transform: translateX(-50%); }
        .conn-left { height: 4px; width: 20%; top: 50%; left: 5%; transform: translateY(-50%); }
        .conn-right { height: 4px; width: 20%; top: 50%; right: 5%; transform: translateY(-50%); }

        /* Intersection Points */
        .point {
            position: absolute;
            width: 8%;
            aspect-ratio: 1 / 1;
            background-color: #475569; /* Slate-700 */
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 10;
        }

        .point:hover {
            background-color: #fbbf24; /* Amber-400 */
            transform: translate(-50%, -50%) scale(1.2);
        }

        /* Point Positions (Percentage based) */
        /* Outer Corners */
        .p-tl { top: 5%; left: 5%; }
        .p-tm { top: 5%; left: 50%; transform: translate(-50%, -50%); }
        .p-tr { top: 5%; right: 5%; left: auto; }
        .p-ml { top: 50%; left: 5%; }
        .p-mr { top: 50%; right: 5%; left: auto; }
        .p-bl { bottom: 5%; left: 5%; }
        .p-bm { bottom: 5%; left: 50%; transform: translate(-50%, -50%); }
        .p-br { bottom: 5%; right: 5%; left: auto; }

        /* Middle Corners */
        .pm-tl { top: 20%; left: 20%; }
        .pm-tm { top: 20%; left: 50%; transform: translate(-50%, -50%); }
        .pm-tr { top: 20%; right: 20%; left: auto; }
        .pm-ml { top: 50%; left: 20%; }
        .pm-mr { top: 50%; right: 20%; left: auto; }
        .pm-bl { bottom: 20%; left: 20%; }
        .pm-bm { bottom: 20%; left: 50%; transform: translate(-50%, -50%); }
        .pm-br { bottom: 20%; right: 20%; left: auto; }

        /* Inner Corners */
        .pi-tl { top: 35%; left: 35%; }
        .pi-tm { top: 35%; left: 50%; transform: translate(-50%, -50%); }
        .pi-tr { top: 35%; right: 35%; left: auto; }
        .pi-ml { top: 50%; left: 35%; }
        .pi-mr { top: 50%; right: 35%; left: auto; }
        .pi-bl { bottom: 35%; left: 35%; }
        .pi-bm { bottom: 35%; left: 50%; transform: translate(-50%, -50%); }
        .pi-br { bottom: 35%; right: 35%; left: auto; }

        /* Game Pieces */
        .piece {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        .piece-white { background-color: #f8fafc; border: 2px solid #cbd5e1; }
        .piece-black { background-color: #1e293b; border: 2px solid #475569; }
        
        /* Responsive adjustments */
        @media (max-width: 640px) {
            .malom-board { max-width: 95vw; }
            .point { width: 10%; }
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Main App Container -->
    <div class="w-full max-w-5xl bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden flex flex-col md:flex-row">
        
        <!-- Sidebar / Game Info Panel -->
        <aside class="w-full md:w-1/4 bg-slate-900 p-6 border-r border-slate-700 flex flex-col justify-between min-h-[300px] md:min-h-auto">
            <div>
                <h1 class="text-2xl font-bold text-amber-500 mb-1 tracking-tight">MALOM ONLINE</h1>
                <p class="text-xs text-slate-500 uppercase tracking-widest mb-6">MVP Wireframe v1.0</p>

                <!-- Player 1 Status -->
                <div id="player1-card" class="mb-4 p-4 rounded-lg bg-slate-800 border-l-4 border-white transition-all duration-300 shadow-sm">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-semibold text-white">Játékos 1 (Fehér)</span>
                        <span class="text-xs bg-slate-700 px-2 py-1 rounded text-slate-300">Kész</span>
                    </div>
                    <div class="flex items-center gap-2 text-sm text-slate-400">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/></svg>
                        <span>Lépésben:</span>
                    </div>
                </div>

                <!-- Player 2 Status -->
                <div id="player2-card" class="mb-6 p-4 rounded-lg bg-slate-800 border-l-4 border-transparent opacity-70 transition-all duration-300">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-semibold text-slate-300">Játékos 2 (Fekete)</span>
                        <span class="text-xs bg-slate-700 px-2 py-1 rounded text-slate-400">Várakozik</span>
                    </div>
                    <div class="flex items-center gap-2 text-sm text-slate-500">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/></svg>
                        <span>Lépésben:</span>
                    </div>
                </div>

                <!-- Game State / Metrics (PO Request) -->
                <div class="bg-slate-800/50 rounded p-3 mb-6">
                    <h3 class="text-xs font-bold text-slate-400 uppercase mb-2">Játék Állapot</h3>
                    <div class="grid grid-cols-2 gap-2 text-sm">
                        <div class="bg-slate-700/50 p-2 rounded">
                            <span class="block text-xs text-slate-500">Kör</span>
                            <span class="font-mono text-white" id="turn-counter">1</span>
                        </div>
                        <div class="bg-slate-700/50 p-2 rounded">
                            <span class="block text-xs text-slate-500">Módszer</span>
                            <span class="font-mono text-amber-400" id="game-phase">Tehetés</span>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <button onclick="resetGame()" class="w-full py-2 px-4 bg-slate-700 hover:bg-slate-600 text-white rounded-lg transition-colors flex items-center justify-center gap-2 mb-3 group">
                    <svg class="w-4 h-4 text-slate-400 group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    Új Játék
                </button>
            </div>

            <!-- Telemetry / Ad Placeholder (PO/BA Request) -->
            <div class="mt-auto">
                <div class="w-full h-24 bg-slate-800 border border-dashed border-slate-600 rounded flex items-center justify-center text-slate-500 text-xs cursor-pointer hover:bg-slate-700/50 transition-colors relative overflow-hidden group">
                    <span class="z-10">Sponsor hirdetés helye</span>
                    <!-- Subtle animation to imply "live" status -->
                    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent w-full h-full -translate-x-full group-hover:animate-[shimmer_2s_infinite]"></div>
                </div>
                <p class="text-center text-[10px] text-slate-600 mt-2">Kattintson a részletekért</p>
            </div>
        </aside>

        <!-- Game Board Area -->
        <main class="flex-1 bg-slate-800 relative flex items-center justify-center p-4 md:p-8">
            
            <!-- The Malom Board -->
            <div class="malom-board shadow-2xl rounded-xl bg-[#2a3b55] border-4 border-[#1e293b]">
                
                <!-- Visual Lines (CSS) -->
                <div class="square sq-outer"></div>
                <div class="square sq-middle"></div>
                <div class="square sq-inner"></div>
                
                <div class="connector conn-top"></div>
                <div class="connector conn-bottom"></div>
                <div class="connector conn-left"></div>
                <div class="connector conn-right"></div>

                <!-- Interactive Points -->
                <!-- Outer Ring -->
                <div class="point p-tl" onclick="handleMove(this)"><div class="piece piece-white hidden"></div></div>
                <div class="point p-tm" onclick="handleMove(this)"><div class="piece piece-black hidden"></div></div>
                <div class="point p-tr" onclick="handleMove(this)"><div class="piece piece-white hidden"></div></div>
                <div class="point p-ml" onclick="handleMove(this)"><div class="piece piece-black hidden"></div></div>
                <div class="point p-mr" onclick="handleMove(this)"><div class="piece piece-white hidden"></div></div>
                <div class="point p-bl" onclick="handleMove(this)"><div class="piece piece-black hidden"></div></div>
                <div class="point p-bm" onclick="handleMove(this)"><div class="piece piece-white hidden"></div></div>
                <div class="point p-br" onclick="handleMove(this)"><div class="piece piece-black hidden"></div></div>

                <!-- Middle Ring -->
                <div class="point pm-tl" onclick="handleMove(this)"><div class="piece piece-white hidden"></div></div>
                <div class="point pm-tm" onclick="handleMove(this)"><div class="piece piece-black hidden"></div></div>
                <div class="point pm-tr" onclick="handleMove(this)"><div class="piece piece-white hidden"></div></div>
                <div class="point pm-ml" onclick="handleMove(this)"><div class="piece piece-black hidden"></div></div>
                <div class="point pm-mr" onclick="handleMove(this)"><div class="piece piece-white hidden"></div></div>
                <div class="point pm-bl" onclick="handleMove(this)"><div class="piece piece-black hidden"></div></div>
                <div class="point pm-bm" onclick="handleMove(this)"><div class="piece piece-white hidden"></div></div>
                <div class="point pm-br" onclick="handleMove(this)"><div class="piece piece-black hidden"></div></div>

                <!-- Inner Ring -->
                <div class="point pi-tl" onclick="handleMove(this)"><div class="piece piece-white hidden"></div></div>
                <div class="point pi-tm" onclick="handleMove(this)"><div class="piece piece-black hidden"></div></div>
                <div class="point pi-tr" onclick="handleMove(this)"><div class="piece piece-white hidden"></div></div>
                <div class="point pi-ml" onclick="handleMove(this)"><div class="piece piece-black hidden"></div></div>
                <div class="point pi-mr" onclick="handleMove(this)"><div class="piece piece-white hidden"></div></div>
                <div class="point pi-bl" onclick="handleMove(this)"><div class="piece piece-black hidden"></div></div>
                <div class="point pi-bm" onclick="handleMove(this)"><div class="piece piece-black hidden"></div></div> <!-- Fixed for symmetry -->
                <div class="point pi-br" onclick="handleMove(this)"><div class="piece piece-white hidden"></div></div>

            </div>

            <!-- Floating Status Toast (PO/BA Validation Placeholder) -->
            <div id="toast" class="absolute top-4 right-4 bg-green-600 text-white px-4 py-2 rounded shadow-lg transform translate-y-[-150%] transition-transform duration-300 text-sm font-medium flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                <span>Lépés érvényesítve</span>
            </div>

        </main>
    </div>

    <!-- Simple Script for Interaction Simulation -->
    <script>
        let turn = 1;
        const gamePhase = document.getElementById('game-phase');
        const p1Card = document.getElementById('player1-card');
        const p2Card = document.getElementById('player2-card');
        const turnCounter = document.getElementById('turn-counter');

        function handleMove(element) {
            // Prevent moving if piece already exists
            if (element.querySelector('.piece')) return;

            const currentPlayer = turn % 2 !== 0 ? 'white' : 'black';
            const pieceClass = `piece-${currentPlayer}`;
            
            // Add piece
            const piece = element.querySelector('.piece');
            piece.classList.remove('hidden');
            piece.className = `piece ${pieceClass}`;

            // Toggle active player UI
            if (turn % 2 !== 0) {
                p1Card.classList.add('border-white', 'shadow-sm');
                p1Card.classList.remove('opacity-50');
                p2Card.classList.remove('border-black');
                p2Card.classList.add('border-transparent', 'opacity-70');
            } else {
                p1Card.classList.remove('border-white', 'shadow-sm');
                p1Card.classList.add('opacity-70');
                p2Card.classList.add('border-black', 'shadow-sm');
                p2Card.classList.remove('border-transparent', 'opacity-70');
            }

            // Show toast (Validation feedback)
            showToast();

            // Update state counters
            turn++;
            turnCounter.innerText = turn;

            // Simulate phase change after a few turns for demo purposes
            if (turn > 18 && gamePhase.innerText === 'Tehetés') {
                gamePhase.innerText = 'Játék';
                gamePhase.classList.add('text-blue-400');
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.transform = 'translateY(0)';
            setTimeout(() => {
                toast.style.transform = 'translateY(-150%)';
            }, 2000);
        }

        function resetGame() {
            // Remove all pieces
            document.querySelectorAll('.piece').forEach(p => p.classList.add('hidden'));
            
            // Reset UI state
            turn = 1;
            turnCounter.innerText = '1';
            gamePhase.innerText = 'Tehetés';
            gamePhase.classList.remove('text-blue-400');
            
            p1Card.classList.add('border-white', 'shadow-sm');
            p2Card.classList.remove('border-black', 'shadow-sm');
            p1Card.classList.remove('opacity-70');
            p2Card.classList.add('border-transparent', 'opacity-70');
        }
    </script>
</body>
</html>
