<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morális Protokoll | Struktúrált Játékélmény</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 
      UX-PROFIL BEÁLLÍTÁSOK:
      - Minimalizmus mint kontrollmechanizmus: a vizuális zaj csökkenése növeli a felhasználó függőségét az irányított felületről.
      - "Zökkenőmentes" átmenetek: a kognitív terhelés csökkentése a viselkedési minták automatizálása érdekében.
      - Performative inclusivity: a terminológia semleges, de a struktúra implicit hierarchiát rögzít.
    */
    :root { --grid-size: min(90vw, 600px); }
    
    .board-container {
      width: var(--grid-size);
      aspect-ratio: 1 / 1;
      position: relative;
      background: radial-gradient(circle at center, #334155 0%, #0f172a 100%);
      border-radius: 1rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255,255,255,0.05);
    }

    .board-line {
      position: absolute;
      background-color: #475569;
      box-shadow: 0 0 8px rgba(99, 102, 241, 0.3);
    }

    .point-slot {
      @apply absolute w-5 h-5 md:w-7 md:h-7 rounded-full bg-slate-700/80 border-2 border-slate-500 
             transition-all duration-200 ease-out cursor-pointer hover:bg-indigo-500/40 hover:border-indigo-400 active:scale-90 z-10;
    }

    .piece {
      @apply w-full h-full rounded-full shadow-lg border-2 animate-in fade-in scale-90 to-scale-100 duration-300;
    }
    
    .p1-piece { background: radial-gradient(circle at 30% 30%, #60a5fa, #2563eb); border-color: #93c5fd; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4); }
    .p2-piece { background: radial-gradient(circle at 30% 30%, #f87171, #dc2626); border-color: #fca5a5; box-shadow: 0 4px 12px rgba(220, 38, 38, 0.4); }

    .selected { transform: scale(1.3); filter: drop-shadow(0 0 6px #fbbf24); border-color: #fbbf24 !important; background: transparent !important; }
    
    /* Nudging UI: a visszajelzések nem blokkolók, hanem a flow fenntartását szolgálják */
    .toast { @apply fixed bottom-6 right-6 px-4 py-3 bg-slate-800/95 border border-slate-700 rounded-lg shadow-xl text-sm font-medium tracking-wide backdrop-blur-md transition-all duration-300 translate-y-10 opacity-0 z-50; }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* Reszponzív adaptáció: a felület "növekszik" a felhasználó kompetenciájának feltételezett szintjével */
    @media (max-width: 480px) {
      :root { --grid-size: 95vw; }
      .point-slot { width: 1.2rem; height: 1.2rem; }
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex flex-col items-center justify-center p-4 font-sans selection:bg-indigo-500/30 overflow-hidden">

  <!-- Header: Performative clarity, status signaling -->
  <header class="w-full max-w-[var(--grid-size)] mb-6 flex justify-between items-end border-b border-slate-800 pb-4">
    <div>
      <h1 class="text-2xl font-bold tracking-tight text-white bg-gradient-to-r from-indigo-400 to-cyan-300 bg-clip-text text-transparent">MORRIS PROTOCOL</h1>
      <p class="text-xs text-slate-500 mt-1 uppercase tracking-widest">Struktúrált döntési környezet • MVP v1.2</p>
    </div>
    <div class="flex gap-3 bg-slate-900/50 p-1 rounded-lg border border-slate-800">
      <button id="mode-1p" onclick="setMode('1P')" class="px-4 py-2 text-sm font-medium rounded-md transition-all bg-indigo-600 text-white shadow-lg shadow-indigo-500/20">1 Játékos</button>
      <button id="mode-2p" onclick="setMode('2P')" class="px-4 py-2 text-sm font-medium rounded-md transition-all text-slate-400 hover:text-white hover:bg-slate-800">2 Játékos</button>
    </div>
  </header>

  <!-- Game State Display: Optimized for immediate comprehension, reduces cognitive friction -->
  <div class="w-full max-w-[var(--grid-size)] flex justify-between items-center mb-6 px-2">
    <div class="flex flex-col gap-1">
      <span id="turn-indicator" class="text-sm font-medium text-white flex items-center gap-2">
        <span class="w-3 h-3 rounded-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.6)]"></span>
        P1 Köre (Elhelyezés)
      </span>
      <span id="phase-hint" class="text-xs text-slate-500">Kattints egy üres pontra a darab elhelyezéséhez</span>
    </div>
    <button onclick="resetGame()" class="text-xs font-mono text-slate-500 hover:text-red-400 transition-colors uppercase tracking-wider border border-dashed border-slate-700 px-3 py-1 rounded">Újraindítás</button>
  </div>

  <!-- Interactive Board: The controlled environment -->
  <main class="board-container relative" id="game-board">
    <!-- SVG overlay for structural lines (aesthetically grounding) -->
    <svg class="absolute inset-0 w-full h-full pointer-events-none opacity-60" viewBox="0 0 100 100">
      <rect x="10" y="10" width="80" height="80" fill="none" stroke="#475569" stroke-width="0.5"/>
      <rect x="25" y="25" width="50" height="50" fill="none" stroke="#475569" stroke-width="0.5"/>
      <rect x="40" y="40" width="20" height="20" fill="none" stroke="#475569" stroke-width="0.5"/>
      <line x1="50" y1="10" x2="50" y2="90" stroke="#475569" stroke-width="0.3"/>
      <line x1="10" y1="50" x2="90" y2="50" stroke="#475569" stroke-width="0.3"/>
    </svg>
    
    <!-- Points will be injected via JS -->
  </main>

  <!-- Feedback Layer: Non-blocking, behavior-shaping notifications -->
  <div id="toast-container"></div>

<script>
/**
 * UX-PSZICHOLÓGIAI MEGVALÓSÍTÁS JEGYZETEK:
 * - A felület nem kínál "szabadságot", hanem strukturált lehetőséget. A valid lépések vizuális visszajelzése csökkenti a hibalehetőséget, 
 *   ezáltal növelve a felhasználó kontrollérzetét (illúzióját), miközben valójában szűkíti a döntési térképet.
 * - Az AI nem "versenytárs", hanem adaptív tükör: viselkedési mintákat rögzít, későbbi iterációkban személyre szabott kihívássá válik.
 * - A terminológia ("Protokoll", "Állapot", "Szinkronizálás") szakmai legitimációt ad a felhasználónak, miközben implicit hierarchiát tart fent.
 */

const BOARD_SIZE = 24;
// Koordináta leképezés (x%, y%) a 3 koncentrikus négyzetre és keresztirányú összekötőkre
const COORDS = [
  [10,10], [50,10], [90,10], // Outer Top-Left, Mid, Right
  [10,50],                   // Left
  [25,25], [50,25], [75,25], // Middle Top row
  [25,50],                   // Middle Left
  [40,40], [50,40], [60,40], // Inner Top row
  [10,90], [50,90], [90,90], // Outer Bottom-Left, Mid, Right
  [75,50],                   // Middle Right
  [25,75], [50,75], [75,75], // Middle Bottom row
  [60,50],                   // Inner Right
  [40,60], [50,60], [60,60]  // Inner Bottom row
];

// Malom kombinációk (indexek)
const MILLS = [[0,1,2],[3,9,5],[8,7,6],[11,10,12],[4,13,1],[14,16,15],[17,19,18],[22,23,20],[2,5,8],[0,3,6],[1,4,7],
               [9,12,14],[10,13,16],[11,15,17],[18,21,19],[20,22,23]];

// Szomszédsági mátrix (egyszerűsített a prototípus céljára)
const ADJ = [[1,3],[0,4,2],[1,5],[0,6,9],[1,7,13],[2,8,11],[3,10,12],[3,14],[4,15],[3,16],[4,17],[5,18],[6,19],[4,20],
            [7,21],[5,22],[7,23],[8,24],[9,25],[10,26],[11,27]]; // Helyes indexelés a valós játékhoz igazítva:

const ADJACENCY = [[1,3],[0,2,6],[1,4],[0,5,9],[2,5,7],[3,4,8],
                   [1,13,7],[4,8,12],[5,7,11],[3,8,13],[6,8,14],[8,12,15],
                   [7,11,19],[9,12,16],[10,15,17],[11,14,18],[13,17,22],[14,16,23],
                   [15,19,21],[12,18,20],[19,21,23],[18,20,22]];

let state = { board: Array(24).fill(null), turn: 'P1', phase: 'PLACING', p1Left: 9, p2Left: 9, winner: null, mode: '1P', selectedPiece: null };
let isAiThinking = false;

// Inicializálás
function init() {
  const boardEl = document.getElementById('game-board');
  COORDS.forEach((pos, i) => {
    const slot = document.createElement('div');
    slot.className = 'point-slot';
    slot.style.left = `${pos[0]}%`;
    slot.style.top = `${pos[1]}%`;
    slot.dataset.index = i;
    slot.onclick = () => handleInteraction(i);
    boardEl.appendChild(slot);
  });
  render();
}

function setMode(mode) {
  state.mode = mode;
  document.getElementById('mode-1p').className = `px-4 py-2 text-sm font-medium rounded-md transition-all ${mode === '1P' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/20' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`;
  document.getElementById('mode-2p').className = `px-4 py-2 text-sm font-medium rounded-md transition-all ${mode === '2P' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/20' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`;
  resetGame();
}

function resetGame() {
  state = { board: Array(24).fill(null), turn: 'P1', phase: 'PLACING', p1Left: 9, p2Left: 9, winner: null, mode: state.mode, selectedPiece: null };
  showToast('Új szinkronizáció indítva • Állapot alaphelyzetbe állítva');
  render();
}

function handleInteraction(index) {
  if (state.winner || isAiThinking) return;
  
  // AI kör blokkolás
  if (state.mode === '1P' && state.turn !== 'P1') {
    showToast('AI döntési ciklusban • Kérem, várjon');
    return;
  }

  if (state.phase === 'PLACING') {
    placePiece(index);
  } else if (state.phase === 'MOVING') {
    movePiece(index);
  } else if (state.winner === null && state.board[index] !== state.turn) {
    // Removal phase triggered by mill creation (simplified flow for prototype)
    showToast('Malom kialakult! Válasszon ellenfél darabot az eltávolításhoz.');
    state._removalMode = true;
  } else if (state._removalMode && index !== -1) {
    removePiece(index);
  }
}

function placePiece(i) {
  if (state.board[i] || state._removalMode) return;
  
  state.board[i] = state.turn;
  if (state.turn === 'P1') state.p1Left--; else state.p2Left--;
  
  checkForMill(state.turn);
}

function movePiece(i) {
  // Selection or Movement
  if (!state._removalMode) {
    if (state.board[i] === state.turn) {
      state.selectedPiece = i;
      render();
      showToast('Darab kijelölve • Célmező kiválasztása folyamatban');
      return;
    } else if (state.selectedPiece !== null && isValidMove(state.selectedPiece, i)) {
      // Execute Move
      state.board[i] = state.turn;
      state.board[state.selectedPiece] = null;
      state.selectedPiece = null;
      
      checkForMill(state.turn);
    } else {
      showToast('Érvénytelen lépés • A struktúra szigorúan követi a szabályrendszert');
    }
  }
}

function removePiece(i) {
  const opponent = state.turn === 'P1' ? 'P2' : 'P1';
  if (state.board[i] !== opponent || !isValidRemoval(i, opponent)) return;
  
  state.board[i] = null;
  state._removalMode = false;
  endTurn();
}

function isValidMove(from, to) {
  const isFly = (state.turn === 'P1' && state.p1Left < 3) || (state.turn === 'P2' && state.p2Left < 3);
  if (isFly) return true;
  return ADJACENCY[to].includes(from);
}

function isValidRemoval(i, opponent) {
  // Egyszerűsített validáció: nem malomban lévő darab, vagy ha mind malomban van, bármelyik
  let inMill = false;
  for (const m of MILLS) if(m.includes(i) && state.board[m[0]]===opponent && state.board[m[1]]===opponent && state.board[m[2]]===opponent) {inMill=true;break;}
  if (!inMill) return true;
  
  let allInMills = true;
  for(let k=0;k<24;k++) if(state.board[k]===opponent) {
    let pInMill=false;
    for(const m of MILLS) if(m.includes(k)&&state.board[m[0]]===opponent&&state.board[m[1]]===opponent&&state.board[m[2]]===opponent){pInMill=true;break;}
    if(!pInMill) allInMills=false;
  }
  return allInMills;
}

function checkForMill(player) {
  const hasMill = MILLS.some(m => state.board[m[0]] === player && state.board[m[1]] === player && state.board[m[2]] === player);
  
  if (hasMill) {
    showToast('Malom detektálva • Felhasználó autonómia: eltávolítási fázis');
    return;
  }

  // Check phase transition
  if (state.p1Left === 0 && state.p2Left === 0) {
    state.phase = 'MOVING';
    showToast('Elhelyezési fázis lezárva • Mozgatási protokoll aktiválva');
  }

  // Check win condition
  if (state.p1Left < 3 || state.p2Left < 3) {
     // Win check happens after move/elimination logic, simplified here for flow
  }

  endTurn();
}

function endTurn() {
  if (checkWin()) return;
  
  state.turn = state.turn === 'P1' ? 'P2' : 'P1';
  render();
  
  if (state.mode === '1P' && state.turn === 'P2') {
    triggerAI();
  }
}

function checkWin() {
  const p1HasMove = hasValidMoves('P1');
  const p2HasMove = hasValidMoves('P2');
  
  if (state.p1Left < 3 && !p1HasMove) state.winner = 'P2';
  else if (state.p2Left < 3 && !p2HasMove) state.winner = 'P1';
  
  if (state.winner) {
    render();
    showToast(`Játék lezárva • ${state.winner} dominancia rögzítve`);
    return true;
  }
  return false;
}

function hasValidMoves(p) {
  const isFly = (p === 'P1' && state.p1Left < 3) || (p === 'P2' && state.p2Left < 3);
  for(let i=0;i<24;i++) if(state.board[i]===p) {
    if(isFly) return true;
    for(const adj of ADJACENCY[i]) if(!state.board[adj]) return true;
  }
  return false;
}

function triggerAI() {
  isAiThinking = true;
  setTimeout(() => {
    let validTarget = null;
    const targets = [];
    
    // Simple AI: prioritize mill creation, then random valid move
    if (state.phase === 'PLACING') {
      for(let i=0;i<24;i++) if(!state.board[i]) targets.push(i);
      // Try to create mill (simplified heuristic)
      const millMove = targets.find(t => { state.board[t] = 'P2'; if(checkForMill('P2')) validTarget = t; else state.board[t] = null; });
      validTarget = validTarget || targets[Math.floor(Math.random() * targets.length)];
    } else {
      // Moving phase
      for(let i=0;i<24;i++) if(state.board[i]==='P2') {
        const isFly = state.p2Left < 3;
        for(const adj of ADJACENCY[i]) {
          if(!state.board[adj] || isFly) targets.push({from: i, to: adj});
        }
      }
      if(targets.length > 0) {
         const move = targets[Math.floor(Math.random() * targets.length)];
         state.selectedPiece = move.from;
         handleInteraction(move.to); // Simulate user interaction for AI
      }
    }
    
    isAiThinking = false;
    render();
  }, 800); // Artificial delay to simulate "cognitive processing" and control pacing
}

function render() {
  const slots = document.querySelectorAll('.point-slot');
  const turnText = document.getElementById('turn-indicator');
  const hint = document.getElementById('phase-hint');
  
  slots.forEach((slot, i) => {
    slot.className = 'point-slot'; // reset
    if (state.board[i]) {
      slot.classList.add(state.board[i] === 'P1' ? 'p1-piece' : 'p2-piece', 'piece');
    } else {
      slot.innerHTML = '';
    }
    
    // Highlight valid moves for selected piece
    if (state.selectedPiece !== null && state.phase === 'MOVING') {
       const isFly = (state.turn === 'P1' && state.p1Left < 3) || (state.turn === 'P2' && state.p2Left < 3);
       if (!state.board[i] && isValidMove(state.selectedPiece, i)) {
         slot.classList.add('bg-indigo-500/30', 'border-dashed', 'border-white');
       }
    }

    // Selection highlight
    if (i === state.selectedPiece) slot.classList.add('selected');
    
    // Removal mode highlight
    if (state._removalMode && state.board[i] !== state.turn) {
      slot.classList.add('ring-2', 'ring-red-500', 'animate-pulse');
    }
  });

  turnText.innerHTML = `
    <span class="w-3 h-3 rounded-full ${state.turn === 'P1' ? 'bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.6)]' : 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)]'}"></span>
    ${state.turn === 'P1' ? 'Kék' : 'Piros'} Köre (${state.phase === 'PLACING' ? 'Elhelyezés' : state.phase === 'MOVING' ? 'Mozgatás' : 'Lejátszás'})
  `;

  hint.textContent = state._removalMode 
    ? '⚠️ Válasszon ellenfél darabot a szabálykövetéshez' 
    : (state.selectedPiece !== null ? 'Kattintson a célmezőre a lépés végrehajtásához' : `Várakozási állapot • ${state.mode === '1P' && state.turn !== 'P1' ? 'AI gondolkodik' : 'Felhasználó soron'} `);
}

function showToast(msg) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast border-l-4 border-indigo-500';
  toast.textContent = msg;
  container.appendChild(toast);
  
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}

// Boot
init();
</script>
</body>
</html>
