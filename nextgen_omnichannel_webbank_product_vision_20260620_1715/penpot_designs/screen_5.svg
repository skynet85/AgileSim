<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1024" width="100%" height="100%">
  <rect width="1440" height="1024" fill="#F8FAFC"/>
  <g id="support-screen">
    <text x="60" y="60" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#0F172A">Digitális Ügyfélszolgálat</text>
    <!-- Chat Panel -->
    <rect x="40" y="90" width="860" height="600" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
    <rect x="40" y="90" width="860" height="40" rx="12 12 0 0" fill="#F8FAFC" stroke="#E2E8F0" stroke-bottom="none"/>
    <text x="56" y="115" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#334155">Biztonságos csatorna</text>
    <rect x="780" y="98" width="120" height="24" rx="12" fill="#DCFCE7"/>
    <circle cx="796" cy="110" r="3" fill="#22C55E"/>
    <text x="806" y="115" font-family="Inter, sans-serif" font-size="10" fill="#15803D">E2E Titkosított</text>
    <!-- Messages -->
    <rect x="70" y="150" width="480" height="60" rx="8" fill="#FFFFFF" stroke="#F1F5F9"/>
    <text x="86" y="175" font-family="Inter, sans-serif" font-size="12" fill="#94A3B8">Bot / 10:12</text>
    <text x="86" y="195" font-family="Inter, sans-serif" font-size="13" fill="#334155">Üdvözlöm! Miben segíthetek a t-9f8a... tranzakcióval?</text>
    <rect x="700" y="230" width="400" height="60" rx="8" fill="#2563EB"/>
    <text x="716" y="255" font-family="Inter, sans-serif" font-size="12" fill="#BFDBFE">Ön / 10:14</text>
    <text x="716" y="275" font-family="Inter, sans-serif" font-size="13" fill="#FFFFFF">A jóváhagyás miért akadt el?</text>
    <!-- Handoff Notice -->
    <rect x="70" y="320" width="840" height="36" rx="6" fill="#F0FDFA" stroke="#99F6E4"/>
    <text x="86" y="343" font-family="Inter, sans-serif" font-size="12" fill="#0F766E">⚠️ Bot handoff: Emberi ügynök átvette a kontextust. traceId: trace-sim-handoff</text>
    <!-- Input -->
    <rect x="40" y="650" width="860" height="40" rx="8" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="56" y="675" font-family="Inter, sans-serif" font-size="13" fill="#94A3B8">Üzenet írása...</text>
    <rect x="790" y="654" width="90" height="32" rx="6" fill="#0891B2"/>
    <text x="810" y="675" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#FFFFFF">Küldés</text>
    <!-- Context Panel -->
    <rect x="930" y="90" width="440" height="600" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="950" y="120" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#334155">Aktuális Kontextus</text>
    <rect x="950" y="150" width="400" height="80" rx="6" fill="#F8FAFC"/>
    <text x="966" y="175" font-family="Inter, sans-serif" font-size="12" fill="#64748B">Tranzakció ID:</text>
    <text x="966" y="195" font-family="monospace" font-size="12" fill="#334155">t-9f8a-c9d8...</text>
    <rect x="950" y="250" width="400" height="80" rx="6" fill="#F8FAFC"/>
    <text x="966" y="275" font-family="Inter, sans-serif" font-size="12" fill="#64748B">Státusz:</text>
    <rect x="1030" y="260" width="120" height="20" rx="10" fill="#DBEAFE"/>
    <text x="1040" y="275" font-family="Inter, sans-serif" font-size="10" fill="#1D4ED8">PENDING_APPROVAL</text>
    <rect x="950" y="360" width="400" height="120" rx="6" fill="#F8FAFC"/>
    <text x="966" y="385" font-family="Inter, sans-serif" font-size="12" fill="#64748B">GDPR compliance:</text>
    <text x="966" y="405" font-family="Inter, sans-serif" font-size="11" fill="#475569">Jogalap: szerződés teljesítése (PSD2). Adattörlés a settings menüpontban.</text>
  </g>
</svg>