<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1024" width="100%" height="100%">
  <rect width="1440" height="1024" fill="#F8FAFC"/>
  <!-- Header -->
  <g id="header">
    <rect x="0" y="0" width="1440" height="64" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="30" y="40" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#0F172A">Dashboard</text>
    <rect x="1150" y="20" width="80" height="24" rx="12" fill="#E0F2FE"/>
    <circle cx="1164" cy="32" r="4" fill="#0EA5E9"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>
    <text x="1176" y="37" font-family="monospace" font-size="11" fill="#0EA5E9">SYNC: 18ms</text>
  </g>
  <!-- Widgets -->
  <g id="dashboard-widgets">
    <!-- Balance Widget -->
    <rect x="60" y="100" width="320" height="140" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="76" y="130" font-family="Inter, sans-serif" font-size="13" fill="#64748B">Fő számla (HU...5678)</text>
    <text x="76" y="175" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#0F172A">€ 14,250.00</text>
    <!-- Spending Widget -->
    <rect x="400" y="100" width="320" height="140" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="416" y="130" font-family="Inter, sans-serif" font-size="13" fill="#64748B">Költési kategóriák (MI)</text>
    <rect x="416" y="150" width="200" height="6" rx="3" fill="#E2E8F0"/>
    <rect x="416" y="150" width="84" height="6" rx="3" fill="#3B82F6"/>
    <text x="416" y="175" font-family="Inter, sans-serif" font-size="11" fill="#475569">Bérlakás 42%</text>
    <!-- Actions Widget -->
    <rect x="740" y="100" width="320" height="140" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="756" y="130" font-family="Inter, sans-serif" font-size="13" fill="#64748B">Gyors akciók</text>
    <rect x="756" y="150" width="140" height="32" rx="6" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="766" y="170" font-family="Inter, sans-serif" font-size="12" fill="#334155">⚡ 1-Click</text>
    <rect x="916" y="150" width="140" height="32" rx="6" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="926" y="170" font-family="Inter, sans-serif" font-size="12" fill="#334155">📄 Sablon</text>
  </g>
  <!-- Transaction Table -->
  <g id="transaction-table">
    <rect x="60" y="280" width="1320" height="240" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="76" y="315" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#0F172A">Valós idejű tranzakciók</text>
    <!-- Row 1 -->
    <rect x="76" y="340" width="1288" height="50" rx="6" fill="#F8FAFC"/>
    <text x="92" y="370" font-family="monospace" font-size="12" fill="#64748B">t-9f8a...</text>
    <text x="300" y="370" font-family="Inter, sans-serif" font-size="13" fill="#334155">HU74...8888</text>
    <text x="600" y="370" font-family="Inter, sans-serif" font-size="13" fill="#334155">€ 250.00</text>
    <rect x="850" y="355" width="110" height="20" rx="10" fill="#DBEAFE"/>
    <text x="860" y="370" font-family="Inter, sans-serif" font-size="10" fill="#1D4ED8">PENDING</text>
  </g>
</svg>