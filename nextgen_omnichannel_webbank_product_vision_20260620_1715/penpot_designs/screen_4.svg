    <text x="460" y="210" font-family="Inter, sans-serif" font-size="14" text-anchor="middle" fill="#475569">Húzza ide a CSV/Excel fájlt</text>
    <!-- Filters -->
    <rect x="880" y="110" width="240" height="36" rx="6" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="900" y="133" font-family="Inter, sans-serif" font-size="13" fill="#94A3B8">🔍 Sablon keresése...</text>
    <!-- Table -->
    <rect x="60" y="320" width="1060" height="50" rx="8" fill="#F1F5F9"/>
    <text x="76" y="352" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#475569">NÉV</text>
    <text x="400" y="352" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#475569">CÍMZETTEK</text>
    <text x="700" y="352" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#475569">STÁTUSZ</text>
    <text x="900" y="352" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#475569">KVK</text>
    <!-- Row 1 -->
    <rect x="60" y="380" width="1060" height="50" rx="8" fill="#FFFFFF"/>
    <text x="76" y="412" font-family="Inter, sans-serif" font-size="13" fill="#334155">Havi beszállító fizetés</text>
    <text x="400" y="412" font-family="Inter, sans-serif" font-size="13" fill="#64748B">47 db</text>
    <rect x="700" y="395" width="100" height="20" rx="10" fill="#DBEAFE"/>
    <text x="710" y="410" font-family="Inter, sans-serif" font-size="10" fill="#1D4ED8">Tervezett</text>
    <rect x="900" y="395" width="80" height="20" rx="6" fill="#F3E8FF"/>
    <path d="M910 400 h6 v-3 h3 v3 h3 v6 h-12 z" fill="#7C3AED"/>
    <text x="920" y="410" font-family="Inter, sans-serif" font-size="10" fill="#5B21B6">Multi-Sig</text>
