<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1024" width="100%" height="100%">
  <rect width="1440" height="1024" fill="#F8FAFC"/>
  <g id="templates-screen">
    <text x="60" y="70" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#0F172A">Sablonok & Kötegelt kezelés</text>
