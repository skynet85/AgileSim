<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1024" width="100%" height="100%">
  <rect width="1440" height="1024" fill="#F8FAFC"/>
  <g id="wizard-screen">
    <text x="720" y="80" font-family="Inter, sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#0F172A">Tranzakció indítása</text>
    <!-- Steps -->
    <g id="step-indicator">
      <circle cx="450" cy="130" r="16" fill="#4F46E5"/>
      <text x="450" y="135" font-family="Inter, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#FFFFFF">1</text>
      <line x1="470" y1="130" x2="550" y2="130" stroke="#CBD5E1"/>
      <circle cx="590" cy="130" r="16" fill="#F1F5F9" stroke="#CBD5E1"/>
      <text x="590" y="135" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#64748B">2</text>
      <line x1="610" y1="130" x2="690" y2="130" stroke="#CBD5E1"/>
      <circle cx="730" cy="130" r="16" fill="#F1F5F9" stroke="#CBD5E1"/>
      <text x="730" y="135" font-family="Inter, sans-serif" font-size="12" text-anchor="middle" fill="#64748B">3</text>
    </g>
    <!-- Form -->
    <rect x="520" y="180" width="400" height="360" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
    <rect x="560" y="220" width="320" height="40" rx="8" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="576" y="245" font-family="Inter, sans-serif" font-size="14" fill="#94A3B8">Összeg (EUR)</text>
    <rect x="560" y="280" width="320" height="40" rx="8" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="576" y="305" font-family="Inter, sans-serif" font-size="14" fill="#94A3B8">Címzett IBAN</text>
    <rect x="560" y="340" width="280" height="40" rx="8" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="576" y="365" font-family="Inter, sans-serif" font-size="14" fill="#94A3B8">Hivatkozás</text>
    <!-- Validation -->
    <rect x="560" y="400" width="20" height="20" rx="4" fill="#D1FAE5"/>
    <path d="M565 410 l4 4 l8-8" stroke="#10B981" stroke-width="2" fill="none"/>
    <text x="590" y="414" font-family="Inter, sans-serif" font-size="12" fill="#065F46">✅ IBAN checksum validálva</text>
    <!-- Submit -->
    <rect x="560" y="480" width="320" height="48" rx="8" fill="#4F46E5"/>
    <text x="720" y="510" font-family="Inter, sans-serif" font-size="15" font-weight="500" text-anchor="middle" fill="#FFFFFF">Tranzakció kezdeményezése</text>
  </g>
</svg>