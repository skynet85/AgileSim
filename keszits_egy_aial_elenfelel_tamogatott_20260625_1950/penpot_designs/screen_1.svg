<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <g id="screen-lobby">
    <!-- Background -->
    <rect x="0" y="0" width="800" height="600" fill="#0f172a"/>
    
    <!-- Card Container -->
    <rect x="40" y="40" width="720" height="520" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    
    <!-- Title -->
    <text x="80" y="90" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#34d399">AI Morris</text>
    <text x="80" y="115" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8">Adaptív AI ellenfél • Determinisztikus állapotgép • WCAG AA compliant</text>
    
    <!-- Difficulty Selection -->
    <rect x="80" y="160" width="320" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="100" y="190" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#f8fafc">EASY</text>
    <text x="320" y="190" font-family="Inter, sans-serif" font-size="12" fill="#64748b">Alap mintázat</text>
    
    <rect x="80" y="220" width="320" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="100" y="250" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#f8fafc">MEDIUM</text>
    <text x="320" y="250" font-family="Inter, sans-serif" font-size="12" fill="#64748b">Közepes adaptáció</text>
    
    <rect x="80" y="280" width="320" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="100" y="310" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#f8fafc">HARD</text>
    <text x="320" y="310" font-family="Inter, sans-serif" font-size="12" fill="#64748b">Magas mintázat</text>
    
    <!-- Selected ADAPTIVE -->
    <rect x="80" y="340" width="320" height="50" rx="8" fill="#042f2e" stroke="#10b981" stroke-width="2"/>
    <text x="100" y="370" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#34d399">ADAPTIVE</text>
    <text x="320" y="370" font-family="Inter, sans-serif" font-size="12" fill="#6ee7b7">Valós idejű szabályozás</text>
    
    <!-- Create Button -->
    <rect x="80" y="420" width="320" height="50" rx="12" fill="#059669"/>
    <text x="240" y="450" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Játék létrehozása</text>
    
    <!-- Metrics Panel -->
    <rect x="460" y="160" width="280" height="310" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="480" y="190" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#cbd5e1">SLA & Metrikák</text>
    
    <text x="480" y="230" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">AI válaszidő:</text>
    <text x="720" y="230" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#34d399">&lt;200ms</text>
    
    <text x="480" y="260" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">Érvényes lépés arány:</text>
    <text x="720" y="260" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#34d399">≥95%</text>
    
    <text x="480" y="290" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">Lighthouse score:</text>
    <text x="720" y="290" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#34d399">≥90</text>
    
    <text x="480" y="320" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">WCAG 2.1 AA:</text>
    <text x="720" y="320" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#34d399">Kötelező</text>
    
    <!-- Decorative Grid -->
    <line x1="480" y1="350" x2="720" y2="350" stroke="#334155" stroke-width="1"/>
    <circle cx="600" cy="380" r="40" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="4,4"/>
  </g>
</svg>