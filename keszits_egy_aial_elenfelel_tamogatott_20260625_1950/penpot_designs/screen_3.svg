<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <g id="screen-invalid-move">
    <!-- Background -->
    <rect x="0" y="0" width="800" height="600" fill="#0f172a"/>
    
    <!-- Error Header -->
    <circle cx="50" cy="50" r="20" fill="#450a0a" stroke="#ef4444" stroke-width="2"/>
    <text x="50" y="56" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#f87171" text-anchor="middle">!</text>
    
    <text x="85" y="55" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#f87171">Érvénytelen lépés</text>
    
    <!-- Error Details -->
    <rect x="50" y="90" width="700" height="120" rx="12" fill="#1e293b" stroke="#7f1d1d" stroke-width="1"/>
    
    <text x="70" y="120" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1"><strong>Rejection reason:</strong></text>
    
    <rect x="70" y="135" width="660" height="65" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="90" y="160" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">from_index=18 to_index=20 nem szomszédos (ADJACENCY[18]不包含 20).</text>
    <text x="90" y="180" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">Validált irány: [14, 22]</text>
    <text x="90" y="200" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">Fázis: PLACING – csak üres cellák fogadhatók</text>
    
    <!-- Action Buttons -->
    <rect x="350" y="240" width="100" height="40" rx="8" fill="#334155"/>
    <text x="400" y="265" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">Tovább</text>
    
    <rect x="470" y="240" width="140" height="40" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="540" y="265" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">Részletes hiba</text>
  </g>
</svg>