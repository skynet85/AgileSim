<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <g id="screen-game-end">
    <!-- Background -->
    <rect x="0" y="0" width="800" height="600" fill="#0f172a"/>
    
    <!-- Result Header -->
    <text x="400" y="80" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#34d399" text-anchor="middle">Játék vége</text>
    <text x="400" y="110" font-family="Inter, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Player győzelem • 14 kör</text>
    
    <!-- Stats Cards -->
    <!-- Validity Rate -->
    <rect x="50" y="150" width="220" height="160" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="160" y="185" font-family="Inter, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Érvényes lépés arány</text>
    <text x="160" y="230" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#34d399" text-anchor="middle">96.8%</text>
    
    <!-- Avg Latency -->
    <rect x="300" y="150" width="220" height="160" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="410" y="185" font-family="Inter, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Átlag AI latency</text>
    <text x="410" y="230" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#60a5fa" text-anchor="middle">183ms</text>
    
    <!-- Error Count -->
    <rect x="550" y="150" width="220" height="160" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="660" y="185" font-family="Inter, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Hibák száma</text>
    <text x="660" y="230" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#f87171" text-anchor="middle">3</text>
    
    <!-- Action Buttons -->
    <rect x="300" y="450" width="200" height="50" rx="12" fill="#059669"/>
    <text x="400" y="480" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Új játék</text>
    
    <rect x="520" y="450" width="200" height="50" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="620" y="480" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">Metrikák exportja</text>
  </g>
</svg>