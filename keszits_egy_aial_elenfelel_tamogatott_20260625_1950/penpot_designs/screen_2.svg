<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <g id="screen-active-game">
    <!-- Background -->
    <rect x="0" y="0" width="800" height="600" fill="#0f172a"/>
    
    <!-- Header -->
    <text x="40" y="50" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#34d399">Aktív játék</text>
    <text x="40" y="70" font-family="Inter, sans-serif" font-size="12" fill="#64748b">Game ID: a3f8c9d2-e7b1... | Trace: 7x9k...</text>
    
    <!-- Phase Badge -->
    <rect x="550" y="30" width="100" height="30" rx="15" fill="#042f2e" stroke="#10b981" stroke-width="1"/>
    <text x="600" y="50" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#34d399" text-anchor="middle">PLACING</text>
    
    <!-- Turn Info -->
    <text x="700" y="50" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1">Turn: Player</text>
    
    <!-- Board Container -->
    <rect x="200" y="100" width="400" height="360" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    
    <!-- Outer Square -->
    <rect x="220" y="120" width="360" height="320" fill="none" stroke="#475569" stroke-width="2"/>
    
    <!-- Middle Square -->
    <rect x="280" y="180" width="240" height="200" fill="none" stroke="#475569" stroke-width="2"/>
    
    <!-- Inner Square -->
    <rect x="340" y="240" width="120" height="80" fill="none" stroke="#475569" stroke-width="2"/>
    
    <!-- Cross Lines -->
    <line x1="400" y1="100" x2="400" y2="460" stroke="#475569" stroke-width="2" stroke-dasharray="6,6"/>
    <line x1="200" y1="280" x2="600" y2="280" stroke="#475569" stroke-width="2" stroke-dasharray="6,6"/>
    
    <!-- Player Pieces (Blue) -->
    <circle cx="400" cy="120" r="12" fill="#0ea5e9"/>
    <circle cx="560" cy="280" r="12" fill="#0ea5e9"/>
    
    <!-- AI Pieces (Amber) -->
    <circle cx="240" cy="280" r="12" fill="#f59e0b"/>
    <circle cx="400" cy="440" r="12" fill="#f59e0b"/>
    
    <!-- AI Thinking State -->
    <rect x="200" y="480" width="400" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="230" cy="510" r="4" fill="#34d399">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="245" y="515" font-family="Inter, sans-serif" font-size="13" fill="#cbd5e1">AI gondolkodik...</text>
    
    <!-- Metrics -->
    <text x="680" y="515" font-family="Inter, sans-serif" font-size="12" fill="#64748b" text-anchor="end">Latency: 187ms | Tier: ADAPTIVE</text>
    
    <!-- Controls -->
    <rect x="300" y="560" width="200" height="40" rx="8" fill="#334155"/>
    <text x="400" y="585" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">Lépés visszavonása</text>
    
    <rect x="520" y="560" width="200" height="40" rx="8" fill="#059669"/>
    <text x="620" y="585" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Játék vége</text>
  </g>
</svg>