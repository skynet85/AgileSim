<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <g id="screen-analytics-dashboard">
    <!-- Background -->
    <rect x="0" y="0" width="800" height="600" fill="#0f172a"/>
    
    <!-- Title -->
    <text x="50" y="50" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#34d399">Analytics Dashboard</text>
    
    <!-- KPI Panel -->
    <rect x="50" y="90" width="680" height="220" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="70" y="120" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#cbd5e1">KPI Trend (7 nap)</text>
    
    <!-- Avg Latency -->
    <text x="70" y="160" font-family="Inter, sans-serif" font-size="13" fill="#94a3b8">Avg Latency</text>
    <text x="720" y="160" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#34d399" text-anchor="end">182ms</text>
    <rect x="70" y="175" width="640" height="6" rx="3" fill="#334155"/>
    <rect x="70" y="175" width="582" height="6" rx="3" fill="#10b981"/> <!-- 91% -->
    
    <!-- Validity Rate -->
    <text x="70" y="210" font-family="Inter, sans-serif" font-size="13" fill="#94a3b8">Validity Rate</text>
    <text x="720" y="210" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#60a5fa" text-anchor="end">95.2%</text>
    <rect x="70" y="225" width="640" height="6" rx="3" fill="#334155"/>
    <rect x="70" y="225" width="608" height="6" rx="3" fill="#3b82f6"/> <!-- 95% -->
    
    <!-- Churn Risk -->
    <text x="70" y="260" font-family="Inter, sans-serif" font-size="13" fill="#94a3b8">Churn Risk</text>
    <text x="720" y="260" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#f87171" text-anchor="end">12.8%</text>
    <rect x="70" y="275" width="640" height="6" rx="3" fill="#334155"/>
    <rect x="70" y="275" width="82" height="6" rx="3" fill="#ef4444"/> <!-- 13% -->
    
    <!-- Adaptív Nehézség Panel -->
    <rect x="50" y="340" width="680" height="140" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="70" y="370" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#cbd5e1">Adaptív Nehézség</text>
    
    <text x="70" y="405" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8"><strong>EASY threshold:</strong></text>
    <text x="400" y="405" font-family="Inter, sans-serif" font-size="12" fill="#cbd5e1">&lt;85% validity</text>
    
    <text x="70" y="430" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8"><strong>HARD threshold:</strong></text>
    <text x="400" y="430" font-family="Inter, sans-serif" font-size="12" fill="#cbd5e1">≥92% validity</text>
    
    <!-- Current Status -->
    <rect x="70" y="455" width="620" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="90" y="485" font-family="Inter, sans-serif" font-size="13" fill="#34d399">Current tier: ADAPTIVE | Pattern match score: 0.87</text>
    
    <!-- Export Button -->
    <rect x="320" y="510" width="160" height="40" rx="8" fill="#334155"/>
    <text x="400" y="535" font-family="Inter, sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">CSV Export</text>
  </g>
</svg>