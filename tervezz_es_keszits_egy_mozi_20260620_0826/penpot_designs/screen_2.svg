<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs><style>.bg-slate-900{fill:#0f172a}.text-blue-400{fill:#60a5fa}.font-bold{font-weight:700}</style></defs>
  
  <!-- Header -->
  <rect width="375" height="56" fill="#0f172a"/>
  <line x1="0" y1="56" x2="375" y2="56" stroke="#334155"/>
  <text x="20" y="38" class="text-blue-400">← Vissza</text>
  <text x="190" y="35" text-anchor="middle" class="font-bold">Dűne: Második rész</text>
  <rect x="280" y="26" width="50" height="24" rx="4" fill="#1e293b"/>
  <text x="305" y="42" text-anchor="middle" class="text-xs">19:30</text>

  <!-- Screen Indicator -->
  <ellipse cx="187.5" cy="160" rx="120" ry="8" fill="#3b82f6" opacity="0.2"/>
  <rect x="75" y="140" width="225" height="2" fill="#6b7280"/>
  <text x="187.5" y="180" text-anchor="middle" class="text-gray-400 text-xs">VETÍTŐVASZON</text>

  <!-- Seat Map Grid -->
  <g transform="translate(30, 210)">
    ${Array.from({length:6}).map((_,r) => Array.from({length:8}).map((_,c) => {
      const x = c * 41.5 + (r%2===0?0:-7), y = r * 38;
      return `<rect x="${x}" y="${y}" width="28" height="28" rx="6" fill="${(r===2&&c===4)?'#374151':'#3b82f6'}" opacity="${(r===2&&c===4)?'0.4':'1'}"/>`;
    }).join(''))}
  </g>

  <!-- Legend -->
  <g transform="translate(90, 460)">
    <rect x="0" y="0" width="8" height="8" rx="2" fill="#3b82f6"/>
    <text x="14" y="8" class="text-xs text-gray-400">Szabad</text>

    <g transform="translate(70, 0)">
      <rect x="0" y="0" width="8" height="8" rx="2" fill="#374151"/>
      <text x="14" y="8" class="text-xs text-gray-400">Foglalt</text>
    </g>

    <g transform="translate(140, 0)">
      <rect x="0" y="0" width="8" height="8" rx="2" fill="#eab308"/>
      <text x="14" y="8" class="text-xs text-gray-400">Premium</text>
    </g>
  </g>

  <!-- CTA -->
  <rect x="20" y="740" width="335" height="48" rx="12" fill="#2563eb"/>
  <text x="190" y="770" text-anchor="middle" class="font-bold text-white">Fizetés & Foglalás →</text>
</svg>