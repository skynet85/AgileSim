<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs><style>.bg-slate-900{fill:#0f172a}.text-blue-400{fill:#60a5fa}.font-bold{font-weight:700}</style></defs>
  
  <!-- Header -->
  <rect width="375" height="56" fill="#0f172a"/>
  <line x1="0" y1="56" x2="375" y2="56" stroke="#334155"/>
  <text x="20" y="38" class="font-bold">Pénztár</text>

  <!-- Progress -->
  <g transform="translate(40, 80)">
    <circle cx="15" cy="15" r="12" fill="#1e293b" stroke="#60a5fa"/>
    <text x="15" y="19" text-anchor="middle" class="font-bold">1</text>
    <rect x="35" y="14" width="80" height="2" fill="#60a5fa"/>
    
    <circle cx="135" cy="15" r="12" fill="#1e293b"/>
    <text x="135" y="19" text-anchor="middle">2</text>
    <rect x="155" y="14" width="80" height="2" fill="#1e293b"/>
    
    <circle cx="255" cy="15" r="12" fill="#1e293b"/>
    <text x="255" y="19" text-anchor="middle">3</text>
  </g>

  <!-- Cart Summary -->
  <rect x="20" y="120" width="335" height="80" rx="12" fill="#1e293b"/>
  <line x1="24" y1="164" x2="351" y2="164" stroke="#334155"/>
  <text x="30" y="145" class="text-gray-400 text-xs">Kosár összege</text>
  <text x="280" y="145" class="font-bold">6 900 Ft</text>
  <rect x="30" y="175" width="16" height="16" rx="4" fill="#10b981"/>
  <text x="52" y="187" class="text-emerald-400 text-xs">✨ Pro kedvezmény: -5% automatikusan levonva</text>

  <!-- Upsell Card -->
  <rect x="20" y="220" width="335" height="90" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-dasharray="4"/>
  <text x="30" y="245" class="font-bold text-blue-400">💎 Csoportos kedvezmény</text>
  <text x="30" y="270" class="text-gray-300 text-xs leading-relaxed">Prémium csomaggal automatikus helyfoglalás, PDF jegy generálás és offline hozzáférés érhető el.</text>

  <!-- Payment Form -->
  <g transform="translate(20, 340)">
    <text x="0" y="20" class="text-gray-400 text-xs">Kártya szám</text>
    <rect width="335" height="48" rx="8" fill="#1e293b"/>
    <text x="15" y="30" class="text-gray-500 text-xs">0000 0000 0000 0000</text>

    <g transform="translate(0, 60)">
      <rect width="162" height="48" rx="8" fill="#1e293b"/>
      <text x="15" y="30" class="text-gray-500 text-xs">MM/YY</text>

      <g transform="translate(175, 0)">
        <rect width="160" height="48" rx="8" fill="#1e293b"/>
        <text x="15" y="30" class="text-gray-500 text-xs">CVC</text>
      </g>
    </g>
  </g>

  <!-- CTA -->
  <rect x="20" y="740" width="335" height="48" rx="12" fill="#059669"/>
  <text x="190" y="770" text-anchor="middle" class="font-bold">Fizetés & Megrendelés</text>
</svg>