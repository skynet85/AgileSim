<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs>
    <style>.bg-slate-900{fill:#0f172a}.text-blue-400{fill:#60a5fa}.text-gray-400{fill:#9ca3af}.font-bold{font-weight:700}.text-xl{font-size:20px;font-family:sans-serif}.text-xs{font-size:12px;font-family:sans-serif}.rounded-lg{rx:8} .rounded-xl{rx:12}</style>
  </defs>
  
  <!-- Status Bar -->
  <rect width="375" height="6" class="bg-slate-900"/>
  
  <!-- Header -->
  <text x="20" y="48" class="font-bold text-xl text-blue-400">MoziApp</text>
  <circle cx="335" cy="40" r="16" fill="#1e293b"/>
  <text x="335" y="44" text-anchor="middle" class="text-xs">🔍</text>
  
  <!-- Date Scroller -->
  <g transform="translate(20, 70)">
    <rect width="60" height="32" rx="8" fill="#2563eb"/>
    <text x="30" y="21" text-anchor="middle" class="text-xs font-bold">Ma</text>
    
    <g transform="translate(70, 0)">
      <rect width="60" height="32" rx="8" fill="#1e293b"/>
      <text x="30" y="21" text-anchor="middle" class="text-xs">Holnap</text>
    </g>
    
    <g transform="translate(140, 0)">
      <rect width="60" height="32" rx="8" fill="#1e293b"/>
      <text x="30" y="21" text-anchor="middle" class="text-xs">Péntek</text>
    </g>
  </g>

  <!-- Movie Cards -->
  <g transform="translate(20, 130)">
    <rect width="335" height="80" rx="12" fill="#1e293b"/>
    <rect x="0" y="0" width="64" height="80" rx="8" fill="#1e3a8a"/>
    <text x="74" y="25" class="font-bold text-xs">Dűne: Második rész</text>
    <text x="74" y="42" class="text-gray-400 text-xs">Sci-Fi • 2h 46m</text>
    <text x="74" y="65" class="text-blue-400 text-xs">Időpontok megtekintése →</text>
  </g>

  <!-- Bottom Nav -->
  <rect y="732" width="375" height="80" fill="#0f172a"/>
  <line x1="0" y1="732" x2="375" y2="732" stroke="#334155"/>
  
  <g transform="translate(60, 750)">
    <text class="text-blue-400 text-xs">🏠</text><text x="18" y="22" class="text-blue-400 text-xs">Kezdőlap</text>
  </g>
  <g transform="translate(150, 750)">
    <text class="text-gray-500 text-xs">🎟️</text><text x="18" y="22" class="text-gray-500 text-xs">Jegyek</text>
  </g>
  <g transform="translate(240, 750)">
    <text class="text-gray-500 text-xs">💎</text><text x="18" y="22" class="text-gray-500 text-xs">Pro</text>
  </g>
  <g transform="translate(310, 750)">
    <text class="text-gray-500 text-xs">👤</text><text x="18" y="22" class="text-gray-500 text-xs">Profil</text>
  </g>
</svg>