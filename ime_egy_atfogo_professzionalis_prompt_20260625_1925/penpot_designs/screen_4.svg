<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" width="1440" height="960">
  <defs>
    <linearGradient id="gameOverBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="960" fill="url(#gameOverBg)"/>

  <!-- Header -->
  <g id="header">
    <rect x="40" y="24" width="180" height="48" rx="8" fill="#f59e0b" opacity="0.9"/>
    <text x="130" y="54" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#0f172a">MALOM</text>

    <!-- Back to lobby -->
    <rect x="1200" y="24" width="200" height="48" rx="24" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="#0f172a"/>
    <text x="1300" y="54" font-family="'Segoe UI', sans-serif" font-size="15" text-anchor="middle" fill="#e2e8f0">← Vissza a Lobby-ba</text>
  </g>

  <!-- Center Game Over Card -->
  <g id="gameOverCard" transform="translate(720, 480)">
    <!-- Card background -->
    <rect x="-350" y="-280" width="700" height="560" rx="24" fill="#1e293b" stroke="rgba(245,158,11,0.2)" stroke-width="2"/>

    <!-- Win/Loss banner -->
    <rect x="-350" y="-280" width="700" height="60" rx="24" fill="#f59e0b" opacity="0.95"/>
    <text x="0" y="-240" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="800" text-anchor="middle" fill="#0f172a">🏆 GYŐZELEM!</text>

    <!-- Trophy icon -->
    <g transform="translate(0, -160)">
      <circle cx="-50" cy="0" r="40" fill="#334155"/>
      <text x="-50" y="8" font-family="'Segoe UI', sans-serif" font-size="28" text-anchor="middle" fill="#f59e0b">A</text>

      <circle cx="50" cy="0" r="40" fill="#334155"/>
      <text x="50" y="8" font-family="'Segoe UI', sans-serif" font-size="28" text-anchor="middle" fill="#ef4444">B</text>

      <!-- VS badge -->
      <rect x="-20" y="-15" width="40" height="30" rx="15" fill="#f59e0b"/>
      <text x="0" y="6" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#0f172a">VS</text>

      <!-- Winner indicator -->
      <circle cx="-50" cy="0" r="48" fill="none" stroke="#f59e0b" stroke-width="3"/>
    </g>

    <!-- Match stats -->
    <rect x="-280" y="-60" width="560" height="160" rx="16" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="#0f172a"/>
    <text x="0" y="-30" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#e2e8f0">Játék Statisztikák</text>

    <!-- Stat columns -->
    <g transform="translate(-140, 30)">
      <rect x="-80" y="0" width="160" height="90" rx="10" stroke="rgba(245,158,11,0.2)" stroke-width="1" fill="#0f172a"/>
      <text x="0" y="30" font-family="'JetBrains Mono', monospace" font-size="24" text-anchor="middle" fill="#f59e0b">12</text>
      <text x="0" y="55" font-family="'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#94a3b8">Lépések száma</text>

      <rect x="-80" y="60" width="160" height="30" rx="8" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="#0f172a"/>
      <text x="0" y="80" font-family="'JetBrains Mono', monospace" font-size="14" text-anchor="middle" fill="#94a3b8">⏱ 04:32</text>
    </g>

    <g transform="translate(140, 30)">
      <rect x="-80" y="0" width="160" height="90" rx="10" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="#0f172a"/>
      <text x="0" y="30" font-family="'JetBrains Mono', monospace" font-size="24" text-anchor="middle" fill="#e2e8f0">+24</text>
      <text x="0" y="55" font-family="'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#94a3b8">ELO változás</text>

      <rect x="-80" y="60" width="160" height="30" rx="8" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="#0f172a"/>
      <text x="0" y="80" font-family="'JetBrains Mono', monospace" font-size="14" text-anchor="middle" fill="#94a3b8">🎯 87% pontosság</text>
    </g>

    <!-- Action buttons -->
    <rect x="-200" y="140" width="160" height="56" rx="28" fill="#f59e0b"/>
    <text x="-120" y="175" font-family="'Segoe UI', sans-serif" font-size="17" font-weight="700" text-anchor="middle" fill="#0f172a">🔄 Újrajátszás</text>

    <rect x="40" y="140" width="160" height="56" rx="28" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="#0f172a"/>
    <text x="120" y="175" font-family="'Segoe UI', sans-serif" font-size="17" text-anchor="middle" fill="#e2e8f0">📋 Elemzés</text>

    <!-- Share button -->
    <rect x="-60" y="220" width="120" height="40" rx="20" stroke="rgba(59,130,246,0.4)" stroke-width="1" fill="#0f172a"/>
    <text x="0" y="246" font-family="'Segoe UI', sans-serif" font-size="13" text-anchor="middle" fill="#3b82f6">📤 Megosztás</text>

    <!-- Rating stars -->
    <g transform="translate(0, 290)">
      <text x="-40" y="0" font-family="'Segoe UI', sans-serif" font-size="14" fill="#94a3b8">Értékelés:</text>
      <circle cx="-5" cy="-6" r="10" fill="#f59e0b"/>
      <circle cx="20" cy="-6" r="10" fill="#f59e0b"/>
      <circle cx="45" cy="-6" r="10" fill="#f59e0b"/>
      <circle cx="70" cy="-6" r="10" fill="#334155"/>
      <circle cx="95" cy="-6" r="10" fill="#334155"/>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="930" width="1440" height="30" fill="#0f172a"/>
  <text x="720" y="950" font-family="'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#64748b">OpenTelemetry span zárolva • Session archived • Replay ID: rep-7X2K-a3f</text>
</svg>