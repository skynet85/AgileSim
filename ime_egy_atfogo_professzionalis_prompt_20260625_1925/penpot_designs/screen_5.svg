<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" width="1440" height="960">
  <defs>
    <linearGradient id="settingsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e293b;switch-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="960" fill="url(#settingsBg)"/>

  <!-- Header -->
  <g id="header">
    <rect x="40" y="24" width="180" height="48" rx="8" fill="#f59e0b" opacity="0.9"/>
    <text x="130" y="54" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#0f172a">MALOM</text>

    <!-- Back button -->
    <rect x="1200" y="24" width="200" height="48" rx="24" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="#0f172a"/>
    <text x="1300" y="54" font-family="'Segoe UI', sans-serif" font-size="15" text-anchor="middle" fill="#e2e8f0">← Vissza</text>

    <!-- Title -->
    <text x="720" y="54" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#e2e8f0">⚙ Beállítások</text>
  </g>

  <!-- Settings Card -->
  <rect x="370" y="120" width="700" height="740" rx="20" fill="#1e293b" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Audio Section -->
  <rect x="410" y="160" width="620" height="120" rx="14" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="#0f172a"/>
  <text x="440" y="195" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#e2e8f0">🔊 Hang beállítások</text>

  <!-- Sound toggle -->
  <rect x="440" y="215" width="250" height="36" rx="8" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="#0f172a"/>
  <text x="470" y="240" font-family="'Segoe UI', sans-serif" font-size="14" fill="#e2e8f0">Hanghatások</text>
  <!-- Toggle ON -->
  <rect x="630" y="225" width="44" height="24" rx="12" fill="#f59e0b"/>
  <circle cx="660" cy="237" r="8" fill="#ffffff"/>

  <!-- Volume slider -->
  <rect x="440" y="260" width="540" height="10" rx="5" fill="#334155"/>
  <rect x="440" y="260" width="400" height="10" rx="5" fill="#f59e0b"/>
  <circle cx="840" cy="265" r="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>

  <!-- Visual Section -->
  <rect x="410" y="300" width="620" height="140" rx="14" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="#0f172a"/>
  <text x="440" y="335" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#e2e8f0">🎨 Vizualitás</text>

  <!-- Theme selector -->
  <rect x="440" y="350" width="250" height="36" rx="8" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="#0f172a"/>
  <text x="470" y="375" font-family="'Segoe UI', sans-serif" font-size="14" fill="#e2e8f0">Téma</text>

  <!-- Theme options -->
  <rect x="630" y="350" width="90" height="36" rx="18" fill="#f59e0b"/>
  <text x="675" y="374" font-family="'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#0f172a">Sötét</text>

  <rect x="730" y="350" width="90" height="36" rx="18" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none"/>
  <text x="775" y="374" font-family="'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#94a3b8">Világos</text>

  <!-- Animation toggle -->
  <rect x="440" y="400" width="250" height="36" rx="8" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="#0f172a"/>
  <text x="470" y="425" font-family="'Segoe UI', sans-serif" font-size="14" fill="#e2e8f0">Animációk</text>

  <!-- Toggle ON -->
  <rect x="630" y="410" width="44" height="24" rx="12" fill="#f59e0b"/>
  <circle cx="660" cy="422" r="8" fill="#ffffff"/>

  <!-- Accessibility Section -->
  <rect x="410" y="460" width="620" height="160" rx="14" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="#0f172a"/>
  <text x="440" y="495" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#e2e8f0">♿ Akesszibilitás</text>

  <!-- High contrast -->
  <rect x="440" y="510" width="280" height="36" rx="8" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="#0f172a"/>
  <text x="470" y="535" font-family="'Segoe UI', sans-serif" font-size="14" fill="#e2e8f0">Magas kontraszt mód</text>

  <!-- Toggle OFF -->
  <rect x="690" y="520" width="44" height="24" rx="12" fill="#334155"/>
  <circle cx="702" cy="532" r="8" fill="#64748b"/>

  <!-- Keyboard navigation -->
  <rect x="440" y="555" width="280" height="36" rx="8" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="#0f172a"/>
  <text x="470" y="580" font-family="'Segoe UI', sans-serif" font-size="14" fill="#e2e8f0">Billentyűzet navigáció</text>

  <!-- Toggle ON -->
  <rect x="690" y="565" width="44" height="24" rx="12" fill="#f59e0b"/>
  <circle cx="720" cy="577" r="8" fill="#ffffff"/>

  <!-- Screen reader -->
  <rect x="440" y="600" width="280" height="36" rx="8" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="#0f172a"/>
  <text x="470" y="625" font-family="'Segoe UI', sans-serif" font-size="14" fill="#e2e8f0">Képernyőolvasó támogatás</text>

  <!-- Toggle ON -->
  <rect x="690" y="610" width="44" height="24" rx="12" fill="#f59e0b"/>
  <circle cx="720" cy="622" r="8" fill="#ffffff"/>

  <!-- Network / Performance -->
  <rect x="410" y="640" width="620" height="100" rx="14" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="#0f172a"/>
  <text x="440" y="675" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#e2e8f0">🌐 Hálózat & Teljesítmény</text>

  <!-- Auto-reconnect -->
  <rect x="440" y="690" width="300" height="36" rx="8" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="#0f172a"/>
  <text x="470" y="715" font-family="'Segoe UI', sans-serif" font-size="14" fill="#e2e8f0">Automatikus újracsatlakozás</text>

  <!-- Toggle ON -->
  <rect x="690" y="700" width="44" height="24" rx="12" fill="#f59e0b"/>
  <circle cx="720" cy="712" r="8" fill="#ffffff"/>

  <!-- Data saver -->
  <rect x="440" y="735" width="300" height="36" rx="8" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="#0f172a"/>
  <text x="470" y="760" font-family="'Segoe UI', sans-serif" font-size="14" fill="#e2e8f0">Adatmegtakarítási mód</text>

  <!-- Toggle OFF -->
  <rect x="690" y="745" width="44" height="24" rx="12" fill="#334155"/>
  <circle cx="702" cy="757" r="8" fill="#64748b"/>

  <!-- Save button -->
  <rect x="590" y="820" width="260" height="48" rx="24" fill="#f59e0b"/>
  <text x="720" y="850" font-family="'Segoe UI', sans-serif" font-size="17" font-weight="700" text-anchor="middle" fill="#0f172a">Mentés & Vissza</text>

  <!-- Version info -->
  <text x="720" y="900" font-family="'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#64748b">v2.1.0 • Open Source (MIT) • Penpot Design System v3</text>
</svg>