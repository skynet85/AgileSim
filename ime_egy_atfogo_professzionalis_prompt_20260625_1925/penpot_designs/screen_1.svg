<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" width="1440" height="960">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1440" height="960" fill="url(#bgGrad)"/>

  <!-- Navigation -->
  <g id="navigation">
    <rect x="40" y="24" width="180" height="48" rx="8" fill="#f59e0b" opacity="0.95"/>
    <text x="130" y="54" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#0f172a">MALOM</text>

    <rect x="1180" y="24" width="120" height="40" rx="20" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" fill="none"/>
    <text x="1240" y="49" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle" fill="#e2e8f0">Belépés</text>

    <rect x="1316" y="24" width="100" height="40" rx="20" fill="rgba(255,255,255,0.1)"/>
    <text x="1366" y="49" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle" fill="#e2e8f0">Regisztráció</text>

    <!-- Nav links -->
    <text x="700" y="50" font-family="'Segoe UI', sans-serif" font-size="15" text-anchor="middle" fill="#94a3b8">Játék</text>
    <text x="820" y="50" font-family="'Segoe UI', sans-serif" font-size="15" text-anchor="middle" fill="#94a3b8">Szabályok</text>
    <text x="940" y="50" font-family="'Segoe UI', sans-serif" font-size="15" text-anchor="middle" fill="#94a3b8">Ranglista</text>
  </g>

  <!-- Hero Section -->
  <g id="hero">
    <text x="720" y="280" font-family="'Segoe UI', sans-serif" font-size="64" font-weight="800" text-anchor="middle" fill="#f8fafc">Nine Men's Morris</text>
    <text x="720" y="340" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="400" text-anchor="middle" fill="#94a3b8" letter-spacing="1">Klasszikus stratégiai játék • Valós idejű multiplayer</text>

    <!-- CTA Buttons -->
    <rect x="560" y="420" width="320" height="64" rx="32" fill="url(#accentGrad)"/>
    <text x="720" y="460" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="700" text-anchor="middle" fill="#ffffff">Játék Indítása</text>

    <!-- Secondary CTA -->
    <rect x="560" y="500" width="320" height="48" rx="24" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" fill="none"/>
    <text x="720" y="530" font-family="'Segoe UI', sans-serif" font-size="16" text-anchor="middle" fill="#cbd5e1">Szabályok Megismerése →</text>

    <!-- Decorative game board hint -->
    <g transform="translate(720, 720)" opacity="0.15">
      <circle cx="0" cy="-80" r="6" fill="#f59e0b"/>
      <circle cx="0" cy="80" r="6" fill="#f59e0b"/>
      <line x1="0" y1="-80" x2="0" y2="80" stroke="#f59e0b" stroke-width="2"/>

      <!-- Mini board outline -->
      <rect x="-120" y="-120" width="240" height="240" rx="4" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
      <rect x="-80" y="-80" width="160" height="160" rx="4" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
      <rect x="-40" y="-40" width="80" height="80" rx="4" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>

      <!-- Connection lines -->
      <line x1="-120" y1="-80" x2="-80" y2="-80" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="120" y1="-80" x2="80" y2="-80" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="-120" y1="80" x2="-80" y2="80" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="120" y1="80" x2="80" y2="80" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="-80" y1="-120" x2="-80" y2="-80" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="80" y1="-120" x2="80" y2="-80" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="-80" y1="80" x2="-80" y2="120" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="80" y1="80" x2="80" y2="120" stroke="#cbd5e1" stroke-width="1"/>

      <!-- Corner connections -->
      <line x1="-120" y1="-120" x2="-80" y2="-80" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="120" y1="-120" x2="80" y2="-80" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="-120" y1="120" x2="-80" y2="80" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="120" y1="120" x2="80" y2="80" stroke="#cbd5e1" stroke-width="1"/>

      <!-- Center connections -->
      <line x1="-40" y1="0" x2="-80" y2="0" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="40" y1="0" x2="80" y2="0" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="0" y1="-40" x2="0" y2="-80" stroke="#cbd5e1" stroke-width="1"/>
      <line x1="0" y1="40" x2="0" y2="80" stroke="#cbd5e1" stroke-width="1"/>
    </g>

    <!-- Stats bar -->
    <g transform="translate(720, 660)">
      <rect x="-300" y="0" width="200" height="48" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <text x="-200" y="30" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle" fill="#f59e0b">🎮 12,847 játékos online</text>

      <rect x="-60" y="0" width="200" height="48" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <text x="40" y="30" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle" fill="#f59e0b">⚡ Átlag várakozás: 8mp</text>

      <rect x="220" y="0" width="200" height="48" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <text x="320" y="30" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle" fill="#f59e0b">🏆 2.1M játszma naponta</text>
    </g>
  </g>
</svg>