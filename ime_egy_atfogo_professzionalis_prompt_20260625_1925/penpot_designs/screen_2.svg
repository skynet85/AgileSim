<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" width="1440" height="960">
  <defs>
    <linearGradient id="lobbyBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="960" fill="url(#lobbyBg)"/>

  <!-- Header -->
  <g id="header">
    <rect x="40" y="24" width="180" height="48" rx="8" fill="#f59e0b" opacity="0.95"/>
    <text x="130" y="54" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#0f172a">MALOM</text>

    <!-- User profile -->
    <circle cx="1300" cy="48" r="20" fill="#334155"/>
    <text x="1300" y="53" font-family="'Segoe UI', sans-serif" font-size="16" text-anchor="middle" fill="#f59e0b">G</text>
    <text x="1240" y="44" font-family="'Segoe UI', sans-serif" font-size="14" fill="#e2e8f0">GrandMaster_42</text>
    <text x="1240" y="62" font-family="'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">ELO: 1847 • ⭐ 4.8</text>

    <!-- Settings icon -->
    <rect x="1350" y="30" width="36" height="36" rx="18" fill="rgba(255,255,255,0.08)"/>
    <text x="1368" y="53" font-family="'Segoe UI', sans-serif" font-size="18" text-anchor="middle" fill="#94a3b8">⚙</text>
  </g>

  <!-- Left Panel - Quick Play -->
  <g id="quickPlayPanel">
    <rect x="60" y="120" width="500" height="720" rx="16" fill="#1e293b" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <text x="310" y="170" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#f8fafc">Játék Indítása</text>
    <text x="310" y="200" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle" fill="#94a3b8">Válassz módot és csatlakozz egy meccshez</text>

    <!-- Quick Play Button -->
    <rect x="120" y="250" width="380" height="72" rx="16" fill="#f59e0b"/>
    <text x="310" y="292" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="700" text-anchor="middle" fill="#0f172a">⚡ Gyors Játék</text>
    <text x="310" y="314" font-family="'Segoe UI', sans-serif" font-size="13" text-anchor="middle" fill="#92400e">ELO matchmaking • ~8 mp várakozás</text>

    <!-- Private Room -->
    <rect x="120" y="350" width="380" height="72" rx="16" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="#0f172a"/>
    <text x="310" y="392" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#e2e8f0">🔒 Privát Szoba</text>

    <!-- Bot Mode -->
    <rect x="120" y="450" width="380" height="72" rx="16" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="#0f172a"/>
    <text x="310" y="492" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#e2e8f0">🤖 Bot Ellen</text>

    <!-- Difficulty selector -->
    <rect x="120" y="540" width="380" height="48" rx="12" stroke="rgba(255,255,255,0.1)" stroke-width="1" fill="#0f172a"/>
    <text x="160" y="570" font-family="'Segoe UI', sans-serif" font-size="14" fill="#94a3b8">Nehézség:</text>

    <!-- Difficulty buttons -->
    <rect x="250" y="548" width="60" height="32" rx="16" fill="#f59e0b"/>
    <text x="280" y="570" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#0f172a">Közép</text>

    <rect x="320" y="548" width="60" height="32" rx="16" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none"/>
    <text x="350" y="570" font-family="'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#94a3b8">Könnyű</text>

    <rect x="390" y="548" width="60" height="32" rx="16" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none"/>
    <text x="420" y="570" font-family="'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#94a3b8">Nehéz</text>

    <!-- Stats section -->
    <rect x="120" y="630" width="380" height="180" rx="12" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="#0f172a"/>
    <text x="310" y="660" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#e2e8f0">Statisztikák</text>

    <rect x="150" y="680" width="130" height="70" rx="8" fill="rgba(245,158,11,0.1)"/>
    <text x="215" y="708" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#f59e0b">347</text>
    <text x="215" y="735" font-family="'Segoe UI', sans-serif" font-size="11" text-anchor="middle" fill="#94a3b8">Győzelem</text>

    <rect x="300" y="680" width="130" height="70" rx="8" fill="rgba(239,68,68,0.1)"/>
    <text x="365" y="708" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#ef4444">89</text>
    <text x="365" y="735" font-family="'Segoe UI', sans-serif" font-size="11" text-anchor="middle" fill="#94a3b8">Vereség</text>

    <!-- Win rate bar -->
    <rect x="200" y="765" width="220" height="8" rx="4" fill="#334155"/>
    <rect x="200" y="765" width="190" height="8" rx="4" fill="#f59e0b"/>
    <text x="310" y="795" font-family="'Segoe UI', sans-serif" font-size="11" text-anchor="middle" fill="#94a3b8">79.6% nyerési arány</text>
  </g>

  <!-- Right Panel - Friends & Activity -->
  <g id="friendsPanel">
