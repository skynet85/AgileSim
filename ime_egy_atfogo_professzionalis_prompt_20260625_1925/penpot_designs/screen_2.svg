      <!-- Friend 1 -->
      <circle cx="-140" cy="-50" r="16" fill="#334155"/>
      <text x="-140" y="-45" font-family="'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#f59e0b">A</text>
      <circle cx="-118" cy="-63" r="7" fill="#22c55e"/>
      <text x="-110" y="-48" font-family="'Segoe UI', sans-serif" font-size="14" fill="#e2e8f0">Alex_Pro</text>
      <text x="-110" y="-32" font-family="'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">ELO 1654</text>

      <!-- Friend 2 -->
      <circle cx="-140" cy="0" r="16" fill="#334155"/>
      <text x="-140" y="5" font-family="'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#8b5cf6">M</text>
      <circle cx="-118" cy="-13" r="7" fill="#22c55e"/>
      <text x="-110" y="2" font-family="'Segoe UI', sans-serif" font-size="14" fill="#e2e8f0">MariaUX</text>
      <text x="-110" y="18" font-family="'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">ELO 1523</text>

      <!-- Friend 3 -->
      <circle cx="-140" cy="50" r="16" fill="#334155"/>
      <text x="-140" y="55" font-family="'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#ec4899">D</text>
      <circle cx="-118" cy="37" r="7" fill="#f59e0b"/>
      <text x="-110" y="52" font-family="'Segoe UI', sans-serif" font-size="14" fill="#e2e8f0">DevKing</text>
      <text x="-110" y="68" font-family="'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">Játékban...</text>

      <!-- Friend 4 -->
      <circle cx="-140" cy="100" r="16" fill="#334155"/>
      <text x="-140" y="105" font-family="'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#06b6d4">K</text>
      <circle cx="-118" cy="87" r="7" fill="#64748b"/>
      <text x="-110" y="102" font-family="'Segoe UI', sans-serif" font-size="14" fill="#e2e8f0">KnightRider</text>
      <text x="-110" y="118" font-family="'Segoe UI', sans-serif" font-size="11" fill="#64748b">Offline</text>
    </g>

    <!-- Invite Button -->
    <rect x="640" y="540" width="300" height="48" rx="24" stroke="#f59e0b" stroke-width="1.5" fill="none"/>
    <text x="790" y="570" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" text-anchor="middle" fill="#f59e0b">+ Barát Meghívása</text>
  </g>

  <!-- Right Panel - Game Activity -->
  <g id="activityPanel">
    <rect x="600" y="540" width="380" height="300" rx="16" fill="#1e293b" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="790" y="580" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#f8fafc">Jelenlegi Játékok</text>

    <!-- Active game 1 -->
    <rect x="630" y="600" width="320" height="56" rx="10" stroke="rgba(245,158,11,0.3)" stroke-width="1" fill="#0f172a"/>
    <circle cx="655" cy="628" r="14" fill="#f59e0b"/>
    <text x="655" y="633" font-family="'Segoe UI', sans-serif" font-size="11" text-anchor="middle" fill="#0f172a">VS</text>
    <text x="740" y="628" font-family="'Segoe UI', sans-serif" font-size="14" fill="#e2e8f0">Alex_Pro vs MariaUX</text>
    <text x="910" y="628" font-family="'Segoe UI', sans-serif" font-size="11" text-anchor="end" fill="#22c55e">● Élő</text>

    <!-- Active game 2 -->
    <rect x="630" y="670" width="320" height="56" rx="10" stroke="rgba(245,158,11,0.3)" stroke-width="1" fill="#0f172a"/>
    <circle cx="655" cy="698" r="14" fill="#8b5cf6"/>
    <text x="655" y="703" font-family="'Segoe UI', sans-serif" font-size="11" text-anchor="middle" fill="#ffffff">VS</text>
    <text x="740" y="698" font-family="'Segoe UI', sans-serif" font-size="14" fill="#e2e8f0">DevKing vs KnightRider</text>
    <text x="910" y="698" font-family="'Segoe UI', sans-serif" font-size="11" text-anchor="end" fill="#22c55e">● Élő</text>

    <!-- Active game 3 -->
    <rect x="630" y="740" width="320" height="56" rx="10" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="#0f172a"/>
    <circle cx="655" cy="768" r="14" fill="#334155"/>
    <text x="655" y="773" font-family="'Segoe UI', sans-serif" font-size="11" text-anchor="middle" fill="#94a3b8">VS</text>
    <text x="740" y="768" font-family="'Segoe UI', sans-serif" font-size="14" fill="#e2e8f0">Player_1 vs Player_2</text>
    <text x="910" y="768" font-family="'Segoe UI', sans-serif" font-size="11" text-anchor="end" fill="#94a3b8">Várakozás...</text>
  </g>

  <!-- Right Panel - Leaderboard -->
  <g id="leaderboardPanel">
    <rect x="1020" y="120" width="380" height="720" rx="16" fill="#1e293b" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="1210" y="160" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#f8fafc">🏆 Ranglista</text>

    <!-- Top 3 -->
    <g transform="translate(1210, 220)">
      <!-- #1 -->
      <rect x="-150" y="-60" width="300" height="70" rx="12" fill="#f59e0b" opacity="0.15"/>
      <text x="-120" y="-30" font-family="'Segoe UI', sans-serif" font-size="28" text-anchor="middle" fill="#f59e0b">🥇</text>
      <text x="-70" y="-34" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#f8fafc">GrandMaster_42</text>
      <text x="-70" y="-14" font-family="'Segoe UI', sans-serif" font-size="13" fill="#94a3b8">ELO: 1847 • 520W / 65L</text>

      <!-- #2 -->
      <rect x="-150" y="20" width="300" height="60" rx="12" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="#0f172a"/>
      <text x="-120" y="40" font-family="'Segoe UI', sans-serif" font-size="20" text-anchor="middle" fill="#94a3b8">🥈</text>
      <text x="-70" y="36" font-family="'Segoe UI', sans-serif" font-size="15" fill="#e2e8f0">ShadowKnight</text>
      <text x="-70" y="54" font-family="'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">ELO: 1789</text>

      <!-- #3 -->
      <rect x="-150" y="90" width="300" height="60" rx="12" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="#0f172a"/>
      <text x="-120" y="110" font-family="'Segoe UI', sans-serif" font-size="20" text-anchor="middle" fill="#94a3b8">🥉</text>
      <text x="-70" y="106" font-family="'Segoe UI', sans-serif" font-size="15" fill="#e2e8f0">ChessWizard_HU</text>
      <text x="-70" y="124" font-family="'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">ELO: 1756</text>

      <!-- #4 -->
      <rect x="-150" y="160" width="300" height="50" rx="10" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="#0f172a"/>
      <text x="-120" y="180" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle" fill="#64748b">4.</text>
      <text x="-70" y="176" font-family="'Segoe UI', sans-serif" font-size="14" fill="#e2e8f0">PixelGeneral</text>
      <text x="130" y="192" font-family="'Segoe UI', sans-serif" font-size="12" text-anchor="end" fill="#94a3b8">ELO: 1701</text>

      <!-- #5 -->
      <rect x="-150" y="220" width="300" height="50" rx="10" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="#0f172a"/>
      <text x="-120" y="240" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle" fill="#64748b">5.</text>
      <text x="-70" y="236" font-family="'Segoe UI', sans-serif" font-size="14" fill="#e2e8f0">BoardMaster99</text>
      <text x="130" y="252" font-family="'Segoe UI', sans-serif" font-size="12" text-anchor="end" fill="#94a3b8">ELO: 1688</text>

      <!-- #6 -->
      <rect x="-150" y="280" width="300" height="50" rx="10" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="#0f172a"/>
      <text x="-120" y="300" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle" fill="#64748b">6.</text>
      <text x="-70" y="296" font-family="'Segoe UI', sans-serif" font-size="14" fill="#e2e8f0">StrategyQueen</text>
      <text x="130" y="312" font-family="'Segoe UI', sans-serif" font-size="12" text-anchor="end" fill="#94a3b8">ELO: 1654</text>
    </g>
  </g>

  <!-- Bottom notification bar -->
  <rect x="0" y="930" width="1440" height="30" fill="#0f172a"/>
  <text x="720" y="950" font-family="'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#64748b">v2.1.0 • Open Source • Digital Inclusion Initiative</text>
</svg>