<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" width="1440" height="960">
  <defs>
    <linearGradient id="gameBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1440" height="960" fill="url(#gameBg)"/>

  <!-- Top Bar -->
  <g id="topBar">
    <rect x="40" y="20" width="180" height="44" rx="8" fill="#f59e0b" opacity="0.9"/>
    <text x="130" y="47" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#0f172a">MALOM</text>

    <!-- Game timer -->
    <rect x="600" y="20" width="240" height="44" rx="22" fill="#334155"/>
    <text x="720" y="48" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#f59e0b">⏱ 04:32</text>

    <!-- Room code -->
    <rect x="870" y="20" width="200" height="44" rx="10" stroke="rgba(255,255,255,0.1)" stroke-width="1" fill="#0f172a"/>
    <text x="910" y="38" font-family="'Segoe UI', sans-serif" font-size="11" fill="#64748b">Room:</text>
    <text x="955" y="38" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="600" fill="#f59e0b">MOR-7X2K</text>

    <!-- Chat button -->
    <rect x="1100" y="20" width="44" height="44" rx="22" fill="#334155"/>
    <text x="1122" y="47" font-family="'Segoe UI', sans-serif" font-size="18" text-anchor="middle" fill="#94a3b8">💬</text>

    <!-- Settings -->
    <rect x="1160" y="20" width="44" height="44" rx="22" fill="#334155"/>
    <text x="1182" y="47" font-family="'Segoe UI', sans-serif" font-size="18" text-anchor="middle" fill="#94a3b8">⚙</text>

    <!-- Surrender -->
    <rect x="1230" y="20" width="170" height="44" rx="22" stroke="rgba(239,68,68,0.4)" stroke-width="1.5" fill="#0f172a"/>
    <text x="1315" y="47" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle" fill="#ef4444">Feladás</text>
  </g>

  <!-- Left Player Panel -->
  <g id="leftPlayerPanel">
    <rect x="40" y="80" width="260" height="780" rx="16" fill="#1e293b" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Player info -->
    <circle cx="170" cy="140" r="32" fill="#f59e0b"/>
    <text x="170" y="148" font-family="'Segoe UI', sans-serif" font-size="20" text-anchor="middle" fill="#0f172a">A</text>

    <text x="130" y="200" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#e2e8f0">Player A (Ön)</text>
    <text x="130" y="220" font-family="'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#94a3b8">ELO: 1654</text>

    <!-- Turn indicator -->
    <rect x="80" y="240" width="200" height="40" rx="20" fill="#f59e0b"/>
    <text x="180" y="266" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#0f172a">🎯 SORON ÖN</text>

    <!-- Stones remaining -->
    <rect x="80" y="310" width="200" height="60" rx="12" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="#0f172a"/>
    <text x="180" y="334" font-family="'Segoe UI', sans-serif" font-size="13" text-anchor="middle" fill="#94a3b8">Hátralévő korongok:</text>

    <!-- 6 stone dots -->
    <g transform="translate(120, 350)">
      <circle cx="0" cy="0" r="8" fill="#f59e0b"/>
      <circle cx="24" cy="0" r="8" fill="#f59e0b"/>
      <circle cx="48" cy="0" r="8" fill="#f59e0b"/>
      <circle cx="72" cy="0" r="8" fill="#f59e0b"/>
      <circle cx="96" cy="0" r="8" fill="#f59e0b"/>
      <circle cx="120" cy="0" r="8" fill="#f59e0b"/>
    </g>

    <!-- Phase indicator -->
    <rect x="80" y="400" width="200" height="40" rx="10" stroke="rgba(245,158,11,0.3)" stroke-width="1" fill="#0f172a"/>
    <text x="180" y="426" font-family="'Segoe UI', sans-serif" font-size="13" text-anchor="middle" fill="#f59e0b">Fázis: Lerakás (6/9)</text>

    <!-- Captured stones -->
    <rect x="80" y="470" width="200" height="60" rx="12" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="#0f172a"/>
    <text x="180" y="494" font-family="'Segoe UI', sans-serif" font-size="13" text-anchor="middle" fill="#94a3b8">Elvett korongok:</text>
    <g transform="translate(120, 515)">
      <circle cx="0" cy="0" r="7" fill="#ef4444"/>
      <circle cx="22" cy="0" r="7" fill="#ef4444"/>
    </g>

    <!-- Move history -->
    <rect x="80" y="560" width="200" height="180" rx="12" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="#0f172a"/>
    <text x="180" y="584" font-family="'Segoe UI', sans-serif" font-size="13" text-anchor="middle" fill="#e2e8f0" font-weight="600">Lépéstörténet</text>

    <!-- History items -->
    <g transform="translate(180, 640)" text-anchor="middle">
      <text y="-30" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">1. A: P→7</text>
      <text y="-12" font-family="'JetBrains Mono', monospace" font-size="11" fill="#64748b">2. B: P→15</text>
      <text y="6" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">3. A: P→3</text>
      <text y="24" font-family="'JetBrains Mono', monospace" font-size="11" fill="#64748b">4. B: P→10</text>
      <text y="42" font-family="'JetBrains Mono', monospace" font-size="11" fill="#94a3b8">5. A: 3→15</text>
    </g>

    <!-- Hint button -->
    <rect x="80" y="760" width="200" height="44" rx="22" stroke="rgba(245,158,11,0.3)" stroke-width="1.5" fill="#0f172a"/>
    <text x="180" y="788" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle" fill="#f59e0b">💡 Tipp</text>

    <!-- Accessibility toggle -->
    <rect x="80" y="820" width="200" height="36" rx="18" stroke="rgba(255,255,255,0.1)" stroke-width="1" fill="#0f172a"/>
    <text x="180" y="844" font-family="'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#94a3b8">♿ Akesszibilitás: Be</text>
  </g>

  <!-- Center - Game Board -->
  <g id="gameBoard" transform="translate(720, 520)">
    <!-- Board background glow -->
    <rect x="-340" y="-340" width="680" height="680" rx="16" fill="#1e293b" stroke="rgba(245,158,11,0.15)" stroke-width="2"/>

    <!-- Outer square -->
    <rect x="-260" y="-260" width="520" height="520" fill="none" stroke="#cbd5e1" stroke-width="3"/>

    <!-- Middle square (rotated 45deg) -->
    <g transform="rotate(45)">
      <rect x="-180" y="-180" width="360" height="360" fill="none" stroke="#cbd5e1" stroke-width="2"/>
    </g>

    <!-- Inner square -->
    <rect x="-90" y="-90" width="180" height="180" fill="none" stroke="#cbd5e1" stroke-width="2"/>

    <!-- Connection lines - outer to middle -->
    <line x1="0" y1="-260" x2="0" y2="-180" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="260" y1="0" x2="180" y2="0" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="0" y1="260" x2="0" y2="180" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="-260" y1="0" x2="-180" y2="0" stroke="#cbd5e1" stroke-width="2"/>

    <!-- Connection lines - middle to inner -->
    <g transform="rotate(45)">
      <line x1="0" y1="-180" x2="0" y2="-90" stroke="#cbd5e1" stroke-width="2"/>
      <line x1="180" y1="0" x2="90" y2="0" stroke="#cbd5e1" stroke-width="2"/>
      <line x1="0" y1="180" x2="0" y2="90" stroke="#cbd5e1" stroke-width="2"/>
      <line x1="-180" y1="0" x2="-90" y2="0" stroke="#cbd5e1" stroke-width="2"/>
    </g>

    <!-- Corner connections -->
    <line x1="-260" y1="-260" x2="-180" y2="-180" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="260" y1="-260" x2="180" y2="-180" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="-260" y1="260" x2="-180" y2="180" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="260" y1="260" x2="180" y2="180" stroke="#cbd5e1" stroke-width="2"/>

    <!-- Connection lines - middle to inner rotated -->
    <g transform="rotate(45)">
      <line x1="-180" y1="-180" x2="-90" y2="-90" stroke="#cbd5e1" stroke-width="2"/>
      <line x1="180" y1="-180" x2="90" y2="-90" stroke="#cbd5e1" stroke-width="2"/>
      <line x1="-180" y1="180" x2="-90" y2="90" stroke="#cbd5e1" stroke-width="2"/>
      <line x1="180" y1="180" x2="90" y2="90" stroke="#cbd5e1" stroke-width="2"/>
    </g>

    <!-- Node positions (24 points) -->
    <!-- Outer square corners and midpoints: 0,1,2,3,4,5,6,7 -->
    <circle cx="-260" cy="-260" r="18" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/> <!-- P0 -->
    <circle cx="0" cy="-260" r="18" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/>   <!-- P1 -->
    <circle cx="260" cy="-260" r="18" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/> <!-- P2 -->
    <circle cx="260" cy="0" r="18" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/>     <!-- P3 -->
    <circle cx="260" cy="260" r="18" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/>   <!-- P4 -->
    <circle cx="0" cy="260" r="18" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/>     <!-- P5 -->
    <circle cx="-260" cy="260" r="18" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/>  <!-- P6 -->
    <circle cx="-260" cy="0" r="18" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/>    <!-- P7 -->

    <!-- Middle square corners and midpoints: 8,9,10,11,12,13,14,15 (rotated) -->
    <g transform="rotate(45)">
      <circle cx="-180" cy="-180" r="16" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/> <!-- P8 -->
      <circle cx="0" cy="-180" r="16" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/>     <!-- P9 -->
      <circle cx="180" cy="-180" r="16" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/>   <!-- P10 -->
      <circle cx="180" cy="0" r="16" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/>      <!-- P11 -->
      <circle cx="180" cy="180" r="16" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/>    <!-- P12 -->
      <circle cx="0" cy="180" r="16" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/>      <!-- P13 -->
      <circle cx="-180" cy="180" r="16" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/>   <!-- P14 -->
      <circle cx="-180" cy="0" r="16" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/>     <!-- P15 -->

      <!-- Inner square corners and midpoints: 16,17,18,19,20,21,22,23 -->
      <circle cx="-90" cy="-90" r="14" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/> <!-- P16 -->
      <circle cx="0" cy="-90" r="14" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/>    <!-- P17 -->
      <circle cx="90" cy="-90" r="14" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/>   <!-- P18 -->
      <circle cx="90" cy="0" r="14" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/>     <!-- P19 -->
      <circle cx="90" cy="90" r="14" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/>    <!-- P20 -->
      <circle cx="0" cy="90" r="14" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/>     <!-- P21 -->
      <circle cx="-90" cy="90" r="14" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/>   <!-- P22 -->
      <circle cx="-90" cy="0" r="14" fill="#0f172a" stroke="#cbd5e1" stroke-width="2"/>    <!-- P23 -->
    </g>

    <!-- Placed stones - Player A (orange) -->
    <circle cx="-260" cy="-260" r="24" fill="#f59e0b" filter="url(#glow)" stroke="#d97706" stroke-width="2"/>
    <text x="-260" y="-253" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle" fill="#0f172a" font-weight="700">A</text>

    <circle cx="0" cy="-260" r="24" fill="#f59e0b" filter="url(#glow)" stroke="#d97706" stroke-width="2"/>
    <text x="0" y="-253" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle" fill="#0f172a" font-weight="700">A</text>

    <circle cx="-90" cy="-90" r="22" fill="#f59e0b" filter="url(#glow)" stroke="#d97706" stroke-width="2"/>
    <text x="-90" y="-83" font-family="'Segoe UI', sans-serif" font-size="13" text-anchor="middle" fill="#0f172a" font-weight="700">A</text>

    <!-- Placed stones - Player B (red) -->
    <circle cx="260" cy="-260" r="24" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
    <text x="260" y="-253" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle" fill="#ffffff" font-weight="700">B</text>

    <circle cx="260" cy="260" r="24" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
    <text x="260" y="253" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle" fill="#ffffff" font-weight="700">B</text>

    <circle cx="-90" cy="-90" r="22" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
    <text x="-90" y="-83" font-family="'Segoe UI', sans-serif" font-size="13" text-anchor="middle" fill="#ffffff" font-weight="700">B</text>

    <!-- Selected node highlight -->
    <circle cx="0" cy="-260" r="24" fill="none" stroke="#f59e0b" stroke-width="3" filter="url(#glow)"/>

    <!-- Valid move hint circles (dashed) -->
    <circle cx="-180" cy="-180" r="16" fill="none" stroke="rgba(245,158,11,0.4)" stroke-width="2" stroke-dasharray="4 3"/>
    <circle cx="0" cy="-90" r="14" fill="none" stroke="rgba(245,158,11,0.4)" stroke-width="2" stroke-dasharray="4 3"/>

    <!-- Mill highlight (3 A stones in a row - outer top) -->
    <line x1="-260" y1="-260" x2="0" y2="-260" stroke="#f59e0b" stroke-width="4" opacity="0.6"/>

    <!-- Move indicator arrow from selected to target -->
    <path d="M 0 -284 L -180 -204" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.7"/>

    <!-- Arrowhead marker definition would be in defs -->
    <defs>
      <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
      </marker>
    </defs>

    <!-- Board label -->
    <text x="300" y="-280" font-family="'Segoe UI', sans-serif" font-size="11" fill="#64748b">Tábla</text>
  </g>

  <!-- Right Player Panel -->
  <g id="rightPlayerPanel">
    <rect x="1140" y="80" width="260" height="780" rx="16" fill="#1e293b" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Opponent info -->
    <circle cx="1270" cy="140" r="32" fill="#ef4444"/>
    <text x="1270" y="148" font-family="'Segoe UI', sans-serif" font-size="20" text-anchor="middle" fill="#ffffff">B</text>

    <text x="1270" y="200" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" text-anchor="middle" fill="#e2e8f0">Player B (Ellenfél)</text>
    <text x="1270" y="220" font-family="'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#94a3b8">ELO: 1589</text>

    <!-- Not your turn -->
    <rect x="1190" y="240" width="200" height="40" rx="20" fill="#334155"/>
    <text x="1290" y="266" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle" fill="#94a3b8">⏳ Ellenfél gondolkozik</text>

    <!-- Stones remaining -->
    <rect x="1190" y="310" width="200" height="60" rx="12" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="#0f172a"/>
    <text x="1290" y="334" font-family="'Segoe UI', sans-serif" font-size="13" text-anchor="middle" fill="#94a3b8">Hátralévő korongok:</text>

    <!-- 6 stone dots for B -->
    <g transform="translate(1230, 350)">
      <circle cx="0" cy="0" r="8" fill="#ef4444"/>
      <circle cx="24" cy="0" r="8" fill="#ef4444"/>
      <circle cx="48" cy="0" r="8" fill="#ef4444"/>
      <circle cx="72" cy="0" r="8" fill="#ef4444"/>
    </g>

    <!-- Phase indicator -->
    <rect x="1190" y="400" width="200" height="40" rx="10" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="#0f172a"/>
    <text x="1290" y="426" font-family="'Segoe UI', sans-serif" font-size="13" text-anchor="middle" fill="#94a3b8">Fázis: Lerakás (5/9)</text>

    <!-- Captured stones -->
    <rect x="1190" y="470" width="200" height="60" rx="12" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="#0f172a"/>
    <text x="1290" y="494" font-family="'Segoe UI', sans-serif" font-size="13" text-anchor="middle" fill="#94a3b8">Elvett korongok:</text>

    <!-- Move history -->
    <rect x="1190" y="560" width="200" height="180" rx="12" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="#0f172a"/>
    <text x="1290" y="584" font-family="'Segoe UI', sans-serif" font-size="13" text-anchor="middle" fill="#e2e8f0" font-weight="600">Lépéstörténet</text>

    <!-- Last move highlight -->
    <rect x="1205" y="700" width="170" height="36" rx="8" stroke="rgba(239,68,68,0.4)" stroke-width="1" fill="#0f172a"/>
    <text x="1290" y="724" font-family="'JetBrains Mono', monospace" font-size="11" text-anchor="middle" fill="#ef4444">6. B: 2→12</text>

    <!-- Rematch button (disabled) -->
    <rect x="1190" y="780" width="200" height="44" rx="22" stroke="rgba(255,255,255,0.1)" stroke-width="1" fill="#0f172a"/>
    <text x="1290" y="808" font-family="'Segoe UI', sans-serif" font-size="14" text-anchor="middle" fill="#64748b">🔄 Újrajátszás</text>
  </g>

  <!-- Bottom status bar -->
  <rect x="320" y="900" width="800" height="50" rx="12" fill="#1e293b" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="720" y="931" font-family="'Segoe UI', sans-serif" font-size="15" text-anchor="middle" fill="#f59e0b">✅ Érvényes lépés várva • Pozíciók: A(6) vs B(4)</text>
</svg>