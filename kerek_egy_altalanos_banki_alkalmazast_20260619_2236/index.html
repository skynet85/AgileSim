<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusBank – Deterministic UX Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        
        /* Smooth transitions for state changes */
        .transition-all-300 { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 300ms; }
        
        /* Custom scrollbar for transaction list */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        
        /* Glassmorphism for balance card */
        .glass-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9));
            backdrop-filter: blur(12px);
            border: 1px solid rgba(71, 85, 105, 0.3);
        }

        /* Pulse animation for live sync indicator */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(2); opacity: 0; }
        }
        .pulse-dot::before {
            content: '';
            position: absolute;
            left: 0; top: 0; width: 6px; height: 6px;
            border-radius: 50%; background-color: #10b981;
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        /* Hide number selection for inputs */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex justify-center items-start pt-safe pb-safe">

    <!-- Mobile Container -->
    <div class="w-full max-w-md bg-slate-900 min-h-screen shadow-2xl relative overflow-hidden flex flex-col">
        
        <!-- Header: Identity & Security Signals -->
        <header class="px-5 py-4 flex justify-between items-center border-b border-slate-800/60 z-10 bg-slate-900/90 backdrop-blur-sm sticky top-0">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold shadow-lg shadow-indigo-500/20">
                    NA
                </div>
                <div>
                    <p class="text-xs text-slate-400 uppercase tracking-wider">Üdvözlünk</p>
                    <h1 class="text-sm font-semibold text-white">Nagy Attila</h1>
                </div>
            </div>
            
            <!-- Compliance/Trust Signal: Subtle but present -->
            <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-500/10 border border-emerald-500/20">
                <i class="fas fa-shield-halved text-emerald-400 text-xs"></i>
                <span class="text-[10px] font-medium text-emerald-300 tracking-wide uppercase">PSD2 Kompatibilis</span>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto px-5 py-6 space-y-6 pb-24">
            
            <!-- Balance Card: Addressing "Illusion of Control" & Transparency -->
            <section class="glass-card rounded-2xl p-5 relative overflow-hidden shadow-xl">
                <!-- Background decorative elements for depth without distraction -->
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-500/20 rounded-full blur-3xl"></div>
                <div class="absolute -bottom-10 -left-10 w-24 h-24 bg-purple-500/10 rounded-full blur-2xl"></div>

                <div class="relative z-10">
                    <div class="flex justify-between items-start mb-6">
                        <span class="text-slate-400 text-sm font-medium">Elérhető egyenleg</span>
                        <!-- Sync Status: Addresses "Eventual Consistency" anxiety -->
                        <div class="flex items-center gap-1.5 pulse-dot relative">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
                            <span class="text-[10px] text-slate-400 font-mono" id="sync-timestamp">Sync: --:--:--</span>
                        </div>
                    </div>

                    <!-- Primary Balance -->
                    <h2 class="text-3xl font-bold text-white mb-1 tracking-tight">
                        124.500,00 
                        <span class="text-lg text-slate-400 font-medium">HUF</span>
                    </h2>
                    
                    <!-- Pending Balance: Transparency to reduce cognitive load/anxiety -->
                    <div class="flex items-center gap-2 mt-3 pt-3 border-t border-white/5">
                        <i class="fas fa-clock text-slate-500 text-xs"></i>
                        <span class="text-xs text-slate-400 font-medium">Függőben: 12.000 HUF</span>
                    </div>
                </div>

                <!-- Quick Actions: Agency vs Safety -->
                <div class="relative z-10 grid grid-cols-4 gap-3 mt-5 pt-4 border-t border-white/10">
                    <button class="flex flex-col items-center justify-center gap-2 group" aria-label="Pénz küldése">
                        <div class="w-10 h-10 rounded-xl bg-indigo-600/20 text-indigo-400 group-hover:bg-indigo-600 group-hover:text-white transition-all-300 flex items-center justify-center shadow-lg shadow-indigo-500/10">
                            <i class="fas fa-paper-plane"></i>
                        </div>
                        <span class="text-[10px] text-slate-400 group-hover:text-white transition-colors">Küldés</span>
                    </button>

                    <button class="flex flex-col items-center justify-center gap-2 group" aria-label="Pénz fogadása">
                        <div class="w-10 h-10 rounded-xl bg-slate-700/30 text-slate-400 group-hover:bg-emerald-600 group-hover:text-white transition-all-300 flex items-center justify-center">
                            <i class="fas fa-qrcode"></i>
                        </div>
                        <span class="text-[10px] text-slate-400 group-hover:text-white transition-colors">Kód</span>
                    </button>

                    <button class="flex flex-col items-center justify-center gap-2 group" aria-label="Pénz befizetése">
                        <div class="w-10 h-10 rounded-xl bg-slate-700/30 text-slate-400 group-hover:bg-purple-600 group-hover:text-white transition-all-300 flex items-center justify-center">
                            <i class="fas fa-arrow-down"></i>
                        </div>
                        <span class="text-[10px] text-slate-400 group-hover:text-white transition-colors">Befizet</span>
                    </button>

                    <button class="flex flex-col items-center justify-center gap-2 group" aria-label="További funkciók">
                        <div class="w-10 h-10 rounded-xl bg-slate-700/30 text-slate-400 group-hover:bg-orange-500 group-hover:text-white transition-all-300 flex items-center justify-center">
                            <i class="fas fa-ellipsis"></i>
                        </div>
                        <span class="text-[10px] text-slate-400 group-hover:text-white transition-colors">Több</span>
                    </button>
                </div>
            </section>

            <!-- Recent Transactions: Keyset Pagination & Decision Fatigue Mitigation -->
            <section>
                <div class="flex justify-between items-end mb-4">
                    <h3 class="text-base font-semibold text-white">Műveletek</h3>
                    <span class="text-xs text-slate-500 cursor-pointer hover:text-indigo-400 transition-colors" onclick="alert('Keyset pagination: Next cursor loaded. No infinite scroll fatigue.')">Összes megtekintése</span>
                </div>

                <!-- Transaction List -->
                <div class="space-y-3" id="transaction-list">
                    <!-- Transactions will be injected here by JS to simulate EventSource feed -->
                </div>

                <!-- Load More Trigger: Explicit control, avoiding infinite scroll trap -->
                <button class="w-full mt-4 py-3 rounded-xl border border-slate-700 text-xs font-medium text-slate-400 hover:bg-slate-800 hover:text-white transition-all-300 active:scale-[0.98]" onclick="simulateLoadMore()">
                    További betöltése
                </button>
            </section>

            <!-- Compliance/Security Nudge: Identity Performance & Safety -->
            <section class="p-4 rounded-xl bg-slate-800/40 border border-slate-700/50 flex items-start gap-3">
                <div class="w-8 h-8 rounded-lg bg-indigo-500/20 text-indigo-400 flex-shrink-0 flex items-center justify-center mt-0.5">
                    <i class="fas fa-fingerprint"></i>
                </div>
                <div>
                    <h4 class="text-sm font-medium text-white mb-1">Biztonsági ellenőrzés</h4>
                    <p class="text-xs text-slate-400 leading-relaxed">
                        A PSD2 szabályzat értelmében rendszeres azonosítás szükséges. A biometrikus hitelesítés aktiválva van.
                    </p>
                </div>
            </section>

        </main>

        <!-- Bottom Navigation: Clear Agency Pathways -->
        <nav class="absolute bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur-md border-t border-slate-800 px-6 py-3 flex justify-between items-center z-20">
            <button class="flex flex-col items-center gap-1 text-indigo-400 group" onclick="setActiveTab(this)">
                <i class="fas fa-home text-lg transition-transform group-hover:-translate-y-0.5"></i>
                <span class="text-[9px] font-medium">Otthon</span>
            </button>
            
            <button class="flex flex-col items-center gap-1 text-slate-500 hover:text-indigo-400 transition-colors group" onclick="setActiveTab(this)">
                <i class="fas fa-wallet text-lg transition-transform group-hover:-translate-y-0.5"></i>
                <span class="text-[9px] font-medium">Kártyák</span>
            </button>

            <!-- Center Action: Prominent Agency -->
            <div class="-mt-8">
                <button class="w-14 h-14 rounded-full bg-indigo-600 text-white shadow-lg shadow-indigo-500/30 flex items-center justify-center hover:bg-indigo-500 transition-all active:scale-90" onclick="alert('Quick Action Modal: Send / Receive / Exchange')">
                    <i class="fas fa-plus text-xl"></i>
                </button>
            </div>

            <button class="flex flex-col items-center gap-1 text-slate-500 hover:text-indigo-400 transition-colors group" onclick="setActiveTab(this)">
                <i class="fas fa-chart-pie text-lg transition-transform group-hover:-translate-y-0.5"></i>
                <span class="text-[9px] font-medium">Analitika</span>
            </button>

            <button class="flex flex-col items-center gap-1 text-slate-500 hover:text-indigo-400 transition-colors group" onclick="setActiveTab(this)">
                <i class="fas fa-cog text-lg transition-transform group-hover:-translate-y-0.5"></i>
                <span class="text-[9px] font-medium">Beállítások</span>
            </button>
        </nav>

    </div>

    <!-- JavaScript: Simulating Deterministic EventSource & Reducer Logic -->
    <script>
        // Mock Data reflecting the "transactions.raw" Kafka topic structure
        const mockTransactions = [
            { id: 'tx-001', type: 'DEBIT', title: 'Spotify Premium', amount: 2990, currency: 'HUF', status: 'APPROVED', timestamp: new Date(Date.now() - 3600000), counterparty: 'Spotify AB' },
            { id: 'tx-002', type: 'CREDIT', title: 'Bérutalás', amount: 450000, currency: 'HUF', status: 'APPROVED', timestamp: new Date(Date.now() - 86400000), counterparty: 'Munkáltató Zrt.' },
            { id: 'tx-003', type: 'DEBIT', title: 'Készpénzfelvétel', amount: 50000, currency: 'HUF', status: 'PENDING', timestamp: new Date(Date.now() - 1800000), counterparty: 'OTP Bank ATM' },
            { id: 'tx-004', type: 'TRANSFER', title: 'Átutalás', amount: 15000, currency: 'HUF', status: 'APPROVED', timestamp: new Date(Date.now() - 7200000), counterparty: 'Kovács Anna' },
        ];

        // Reducer-like function to handle optimistic updates & consistency
        const transactionReducer = (state, action) => {
            switch(action.type) {
                case 'ADD_TRANSACTION':
                    return [action.payload, ...state];
                case 'UPDATE_STATUS':
                    return state.map(tx => 
                        tx.id === action.payload.id ? { ...tx, status: action.payload.status } : tx
                    );
                default:
                    return state;
            }
        };

        let transactions = [...mockTransactions];

        // Render Function with Deterministic Formatting
        function renderTransactions() {
            const list = document.getElementById('transaction-list');
            list.innerHTML = '';

            transactions.forEach(tx => {
                const isCredit = tx.type === 'CREDIT';
                const amountColor = isCredit ? 'text-emerald-400' : 'text-white';
                const sign = isCredit ? '+' : '-';
                const statusClass = tx.status === 'APPROVED' 
                    ? 'bg-slate-800 text-slate-400' 
                    : 'bg-amber-500/10 text-amber-300 border border-amber-500/20';
                const statusText = tx.status === 'APPROVED' ? 'Kész' : 'Függőben';
                
                // Time formatting for cognitive ease (relative time)
                const now = new Date();
                const diffMs = now - tx.timestamp;
                let timeStr = '';
                if (diffMs < 3600000) timeStr = `${Math.floor(diffMs / 60000)} perce`;
                else if (diffMs < 86400000) timeStr = `Ma ${tx.timestamp.getHours()}:${String(tx.timestamp.getMinutes()).padStart(2, '0')}`;
                else timeStr = `${tx.timestamp.getMonth()+1}/${tx.getDate()}. ${tx.timestamp.getHours()}:${String(tx.timestamp.getMinutes()).padStart(2, '0')}`;

                const html = `
                    <div class="flex items-center justify-between p-3 rounded-xl bg-slate-800/40 hover:bg-slate-800 transition-all cursor-pointer group" onclick="alert('Transaction Detail: Idempotency-Key & Audit Trail available')">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full ${isCredit ? 'bg-emerald-500/10 text-emerald-400' : 'bg-slate-700 text-slate-300'} flex items-center justify-center group-hover:scale-105 transition-transform">
                                <i class="fas ${isCredit ? 'fa-arrow-down' : (tx.type === 'TRANSFER' ? 'fa-exchange-alt' : 'fa-receipt')}"></i>
                            </div>
                            <div>
                                <p class="text-sm font-medium text-white">${tx.title}</p>
                                <div class="flex items-center gap-2 mt-0.5">
                                    <span class="text-[10px] text-slate-500">${timeStr} • ${tx.counterparty}</span>
                                    <span class="text-[9px] px-1.5 py-0.5 rounded bg-white/5 text-slate-400 font-mono">ID: ...${tx.id.slice(-3)}</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex flex-col items-end gap-1">
                            <p class="text-sm font-bold ${amountColor}">${sign}${tx.amount.toLocaleString('hu-HU')} Ft</p>
                            <span class="text-[9px] font-medium uppercase tracking-wide px-2 py-0.5 rounded-full ${statusClass}">${statusText}</span>
                        </div>
                    </div>
                `;
                list.insertAdjacentHTML('beforeend', html);
            });
        }

        // Simulate EventSource / WebSocket feed for "Eventual Consistency"
        function simulateLiveUpdates() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('sync-timestamp').innerText = `Sync: ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
                
                // Simulate a status change from PENDING to APPROVED (Optimistic -> Eventual Consistency resolution)
                const pendingTx = transactions.find(t => t.status === 'PENDING');
                if (pendingTx && Math.random() > 0.7) {
                    transactions = transactionReducer(transactions, { 
                        type: 'UPDATE_STATUS', 
                        payload: { id: pendingTx.id, status: 'APPROVED' } 
                    });
                    renderTransactions();
                    
                    // Subtle notification for state change (Social Validation / Agency reinforcement)
                    const notify = document.createElement('div');
                    notify.className = 'absolute top-4 left-1/2 transform -translate-x-1/2 bg-emerald-500 text-white text-xs px-3 py-2 rounded-lg shadow-lg z-50 animate-bounce';
                    notify.innerHTML = '<i class="fas fa-check-circle mr-1"></i> Tranzakció jóváhagyva';
                    document.body.appendChild(notify);
                    setTimeout(() => notify.remove(), 2000);
                }
            }, 3000);
        }

        // Simulate Keyset Pagination "Load More"
        function simulateLoadMore() {
            const btn = document.querySelector('button[onclick="simulateLoadMore()"]');
            const originalText = btn.innerText;
            btn.innerText = 'Betöltés...';
            btn.disabled = true;
            
            setTimeout(() => {
                // Add more mock data to simulate DB cursor fetch
                const newTxs = [
                    { id: 'tx-005', type: 'DEBIT', title: 'Amazon EU', amount: 12490, currency: 'HUF', status: 'APPROVED', timestamp: new Date(Date.now() - 172800000), counterparty: 'Amazon' },
                    { id: 'tx-006', type: 'DEBIT', title: 'MOL Fuel', amount: 35000, currency: 'HUF', status: 'APPROVED', timestamp: new Date(Date.now() - 259200000), counterparty: 'Mol Nyrt.' }
                ];
                
                transactions = [...transactions, ...newTxs];
                renderTransactions();
                
                btn.innerText = originalText;
                btn.disabled = false;
            }, 800); // Simulate network latency <200ms p95 goal (mocked slightly higher for UX)
        }

        // Bottom Nav Interaction
        function setActiveTab(el) {
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('text-indigo-400');
                btn.classList.add('text-slate-500');
                const icon = btn.querySelector('i');
                if(icon) icon.classList.remove('scale-110');
            });
            
            el.classList.remove('text-slate-500');
            el.classList.add('text-indigo-400');
            const icon = el.querySelector('i');
            if(icon) icon.classList.add('scale-110');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderTransactions();
            simulateLiveUpdates();
            
            // Initial sync timestamp update
            const now = new Date();
            document.getElementById('sync-timestamp').innerText = `Sync: ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        });

    </script>
</body>
</html>
